<head>

<script>
  tailwind.config = {
    darkMode: 'class',
    theme: {
      extend: {
        fontFamily: {
          sans: ['Inter', 'ui-sans-serif', 'system-ui'],
          heading: ['Plus Jakarta Sans', 'sans-serif'],
          display: ['var(--font-display)'],
        },
        colors: {
          appBg: 'var(--bg-app)',
          cardBg: 'var(--bg-card)',
          cardBorder: 'var(--border-card)',
          accent: {
            DEFAULT: 'var(--accent)',
            soft: 'var(--accent-soft)',
            dim: 'var(--accent-dim)',
          },
          positive: 'var(--positive)',
          negative: 'var(--negative)',
          warn: 'var(--warning)',
          textPrimary: 'var(--text-primary)',
          textSecondary: 'var(--text-secondary)',
          textMuted: 'var(--text-muted)',
          base: {
            950: 'var(--bg-app)',
            900: 'var(--bg-card)',
            850: 'var(--bg-card)',
            800: 'var(--border-card)',
            700: 'var(--border-card)',
            600: 'var(--text-muted)',
          }
        },
        borderRadius: {
          theme: 'var(--border-radius)',
        },
        boxShadow: {
          theme: 'var(--shadow-card)',
          elevated: 'var(--shadow-elevated)',
          glow: '0 0 0 1px var(--border-card), 0 8px 30px -8px var(--border-card)',
        }
      },
    },
  };
</script>
<style>
  :root {
    /* TEMA 1 - "FINTECH PREMIUM" (Default, evoluzione di Dark Glow) */
    --bg-app: #05070d;
    --bg-card: rgba(21, 31, 50, 0.7);
    --border-card: rgba(51, 65, 85, 0.5);
    --accent: #10b981;
    --accent-soft: #34d399;
    --accent-dim: #065f46;
    --text-primary: #ffffff;
    --text-secondary: #cbd5e1;
    --text-muted: #64748b;
    --shadow-card: 0 0 0 1px rgba(16, 185, 129, 0.14), 0 12px 34px -10px rgba(16, 185, 129, 0.22), inset 0 1px 0 0 rgba(255, 255, 255, 0.04);
    --shadow-elevated: 0 24px 64px -14px rgba(0, 0, 0, 0.6), 0 0 0 1px rgba(16, 185, 129, 0.16);
    --backdrop-blur: blur(14px);
    --border-radius: 1.25rem;
    --font-display: 'Plus Jakarta Sans', 'Inter', sans-serif;

    /* Colori semantici universali: guadagno/perdita restano leggibili a colpo d'occhio in ogni tema */
    --positive: #10b981;
    --negative: #f43f5e;
    --warning: #f59e0b;

    /* Palette grafici Chart.js */
    --chart-grid: rgba(51, 65, 85, 0.25);
    --chart-tick: #64748b;
    --chart-legend: #94a3b8;
    --chart-tooltip-bg: #0f172a;
    --chart-tooltip-border: #334155;
    --chart-tooltip-title: #ffffff;
    --chart-tooltip-body: #cbd5e1;
    --chart-invested: #64748b;
    --chart-value: #10b981;
    --chart-value-fill: rgba(16, 185, 129, 0.14);
    --chart-real: #f59e0b;
    --chart-doughnut-border: #0b1120;
    --chart-pessimist: #ef4444;
    --chart-median: #38bdf8;
    --chart-optimist: #22c55e;
    --chart-compare-invested: #334155;
  }

  body.theme-minimal {
    /* TEMA 2 - "CLEAN LIGHT SaaS" (evoluzione di Neo-Minimalist) */
    --bg-app: #f8fafc;
    --bg-card: #ffffff;
    --border-card: #e2e8f0;
    --accent: #1d4ed8;
    --accent-soft: #2563eb;
    --accent-dim: #1e3a8a;
    --text-primary: #0f172a;
    --text-secondary: #334155;
    --text-muted: #94a3b8;
    --shadow-card: 0 1px 2px rgba(15, 23, 42, 0.04), 0 1px 0 0 rgba(15, 23, 42, 0.03), inset 0 1px 0 0 rgba(255, 255, 255, 0.6);
    --shadow-elevated: 0 30px 60px -16px rgba(15, 23, 42, 0.18), 0 0 0 1px rgba(15, 23, 42, 0.06);
    --backdrop-blur: none;
    --border-radius: 0.9rem;
    --font-display: 'Space Grotesk', 'Plus Jakarta Sans', sans-serif;

    --chart-grid: rgba(100, 116, 139, 0.14);
    --chart-tick: #64748b;
    --chart-legend: #475569;
    --chart-tooltip-bg: #0f172a;
    --chart-tooltip-border: #1e293b;
    --chart-tooltip-title: #ffffff;
    --chart-tooltip-body: #e2e8f0;
    --chart-invested: #94a3b8;
    --chart-value: #1d4ed8;
    --chart-value-fill: rgba(29, 78, 216, 0.08);
    --chart-real: #ea580c;
    --chart-doughnut-border: #ffffff;
    --chart-pessimist: #dc2626;
    --chart-median: #1d4ed8;
    --chart-optimist: #059669;
    --chart-compare-invested: #cbd5e1;
  }

  body.theme-glass {
    /* TEMA 3 - "GLASS DEPTH" (evoluzione di Glassmorphism) */
    --bg-app: #070913;
    --bg-card: rgba(15, 23, 42, 0.35);
    --border-card: rgba(255, 255, 255, 0.09);
    --accent: #8b5cf6;
    --accent-soft: #a78bfa;
    --accent-dim: #4c1d95;
    --text-primary: #ffffff;
    --text-secondary: #e2e8f0;
    --text-muted: #94a3b8;
    --shadow-card: 0 8px 32px 0 rgba(0, 0, 0, 0.37), inset 0 1px 0 0 rgba(255, 255, 255, 0.08);
    --shadow-elevated: 0 40px 80px -20px rgba(0, 0, 0, 0.65), 0 0 0 1px rgba(255, 255, 255, 0.1);
    --backdrop-blur: blur(26px);
    --border-radius: 1.75rem;
    --font-display: 'Plus Jakarta Sans', 'Inter', sans-serif;

    --chart-grid: rgba(255, 255, 255, 0.08);
    --chart-tick: #94a3b8;
    --chart-legend: #cbd5e1;
    --chart-tooltip-bg: rgba(15, 23, 42, 0.92);
    --chart-tooltip-border: rgba(255, 255, 255, 0.14);
    --chart-tooltip-title: #ffffff;
    --chart-tooltip-body: #e2e8f0;
    --chart-invested: #94a3b8;
    --chart-value: #8b5cf6;
    --chart-value-fill: rgba(139, 92, 246, 0.18);
    --chart-real: #fbbf24;
    --chart-doughnut-border: rgba(7, 9, 19, 0.85);
    --chart-pessimist: #fb7185;
    --chart-median: #38bdf8;
    --chart-optimist: #34d399;
    --chart-compare-invested: rgba(255, 255, 255, 0.3);
  }

  html { scroll-behavior: smooth; }

  html, body {
    background-color: var(--bg-app);
    color: var(--text-secondary);
    transition: background-color 0.4s cubic-bezier(0.4, 0, 0.2, 1), color 0.4s ease;
  }

  ::selection { background: var(--accent); color: var(--bg-app); }

  :focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; border-radius: 4px; }

  ::-webkit-scrollbar { width: 8px; height: 8px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border-card); border-radius: 999px; }
  ::-webkit-scrollbar-thumb:hover { background: var(--accent); }

  .card {
    position: relative;
    background: var(--bg-card);
    border: 1px solid var(--border-card);
    border-radius: var(--border-radius) !important;
    box-shadow: var(--shadow-card);
    backdrop-filter: var(--backdrop-blur);
    -webkit-backdrop-filter: var(--backdrop-blur);
    transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1), box-shadow 0.3s cubic-bezier(0.4, 0, 0.2, 1), border-color 0.3s ease;
  }

  .card:has(canvas)::after {
    content: '';
    position: absolute; inset: 0;
    border-radius: inherit;
    background: radial-gradient(120% 90% at 50% 0%, color-mix(in srgb, var(--accent) 7%, transparent), transparent 60%);
    pointer-events: none;
  }

  .drawer { transition: transform .25s ease; }
  .fade-in { animation: fadeIn .25s cubic-bezier(0.4, 0, 0.2, 1); }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }
  input[type="number"]::-webkit-inner-spin-button, input[type="number"]::-webkit-outer-spin-button { opacity: 1; }

  input[type="range"] { accent-color: var(--accent); }
  input[type="range"]::-webkit-slider-thumb { box-shadow: 0 2px 10px -2px var(--accent); }

  .progress-track { background: repeating-linear-gradient(135deg, rgba(255,255,255,0.03) 0 6px, transparent 6px 12px); overflow: hidden; }
  .progress-track > div { transition: width 700ms cubic-bezier(0.4, 0, 0.2, 1) !important; box-shadow: 0 0 10px -2px rgba(0,0,0,0.4); }
  body.theme-minimal .progress-track { background: #eef2f7; }
  body.theme-minimal .progress-track > div { box-shadow: none; }

  /* Barra di accento laterale per le stat card della Dashboard */
  .stat-card { position: relative; overflow: hidden; }
  .stat-card::before {
    content: '';
    position: absolute; left: 0; top: 0; bottom: 0; width: 3px;
    background: linear-gradient(180deg, var(--accent), var(--accent-soft));
  }
  body.theme-glass .stat-card::before { width: 4px; box-shadow: 0 0 14px var(--accent); }
  body.theme-minimal .stat-card::before { width: 3px; }

  /* Numeri "hero" in evidenza (valore patrimonio, ecc.) */
  .value-hero {
    font-family: var(--font-display);
    font-variant-numeric: tabular-nums;
    letter-spacing: -0.02em;
  }
  body.theme-glass .value-hero {
    text-shadow: 0 0 24px color-mix(in srgb, var(--accent) 35%, transparent);
  }

  /* Blurry background decorations for Glassmorphism */
  body.theme-glass .theme-glass-blobs {
    display: block !important;
  }

  /* ---------------------------------- Neo-Minimalist Overrides ---------------------------------- */
  body.theme-minimal .text-white,
  body.theme-minimal .text-slate-100,
  body.theme-minimal .text-slate-200 {
    color: var(--text-primary) !important;
  }
  body.theme-minimal .text-slate-300,
  body.theme-minimal .text-slate-400 {
    color: var(--text-secondary) !important;
  }
  body.theme-minimal .text-slate-500 {
    color: var(--text-muted) !important;
  }
  body.theme-minimal .border-base-800,
  body.theme-minimal .border-base-700,
  body.theme-minimal .border-base-700\/60,
  body.theme-minimal .border-base-700\/50,
  body.theme-minimal .divide-base-700\/50 > * + * {
    border-color: var(--border-card) !important;
  }
  body.theme-minimal input,
  body.theme-minimal select,
  body.theme-minimal textarea {
    background-color: #f8fafc !important;
    border-color: #dde3ea !important;
    color: #0f172a !important;
  }
  body.theme-minimal input:focus,
  body.theme-minimal select:focus {
    border-color: var(--accent) !important;
    box-shadow: 0 0 0 3px color-mix(in srgb, var(--accent) 18%, transparent) !important;
  }
  body.theme-minimal aside#sidebar {
    background-color: #ffffff !important;
    border-right-color: var(--border-card) !important;
  }
  body.theme-minimal aside#sidebar .text-white {
    color: #0f172a !important;
  }
  body.theme-minimal header {
    background-color: rgba(255, 255, 255, 0.85) !important;
    border-bottom-color: var(--border-card) !important;
  }
  body.theme-minimal header .text-white {
    color: #0f172a !important;
  }
  body.theme-minimal footer {
    color: #64748b !important;
  }

  /* ---------------------------------- Fonts & Card Hover Elevate ---------------------------------- */
  h1, h2, h3, h4, .font-bold {
    font-family: var(--font-display) !important;
  }

  .card:hover {
    transform: translateY(-4px);
    border-color: var(--accent) !important;
    box-shadow: 0 22px 44px -14px rgba(0, 0, 0, 0.45), 0 0 0 1px var(--accent), inset 0 1px 0 0 rgba(255, 255, 255, 0.05) !important;
  }

  body.theme-minimal .card:hover {
    transform: translateY(-3px);
    border-color: var(--accent) !important;
    box-shadow: 0 18px 34px -16px rgba(15, 23, 42, 0.16), 0 0 0 1px var(--accent), inset 0 1px 0 0 rgba(255, 255, 255, 0.8) !important;
  }

  body.theme-glass .card:hover {
    transform: translateY(-4px) scale(1.004);
    border-color: var(--accent) !important;
    box-shadow: 0 30px 60px -18px rgba(0, 0, 0, 0.55), 0 0 0 1px var(--accent), inset 0 1px 0 0 rgba(255, 255, 255, 0.12) !important;
  }

  /* ---------------------------------- Dashboard: disposizione hero per tema ---------------------------------- */
  @media (min-width: 1024px) {
    /* Clean Light SaaS: bento hero, la prima card (valore patrimonio) occupa 2x2 */
    body.theme-minimal .dash-stats-grid {
      grid-auto-rows: 1fr;
    }
    body.theme-minimal .dash-stats-grid > *:first-child {
      grid-column: span 2;
      grid-row: span 2;
      display: flex;
      flex-direction: column;
      justify-content: center;
    }
    body.theme-minimal .dash-stats-grid > *:first-child .value-hero {
      font-size: 2.5rem;
      line-height: 1.1;
    }

    /* Glass Depth: pannelli fluttuanti a profondita' diverse */
    body.theme-glass .dash-stats-grid > *:nth-child(2) { transform: translateY(10px); }
    body.theme-glass .dash-stats-grid > *:nth-child(3) { transform: translateY(-6px); }
    body.theme-glass .dash-stats-grid > *:nth-child(4) { transform: translateY(14px); }
  }

  /* ---------------------------------- Componenti condivisi ---------------------------------- */
  .empty-state-icon {
    animation: emptyPulse 2.6s ease-in-out infinite;
  }
  @keyframes emptyPulse {
    0%, 100% { box-shadow: 0 0 0 0 color-mix(in srgb, var(--accent) 25%, transparent); }
    50% { box-shadow: 0 0 0 10px color-mix(in srgb, var(--accent) 0%, transparent); }
  }

  #modalBackdrop, #confirmBackdrop {
    backdrop-filter: blur(4px);
    -webkit-backdrop-filter: blur(4px);
    animation: fadeIn .2s ease;
  }
  body.theme-glass #modalBackdrop, body.theme-glass #confirmBackdrop {
    backdrop-filter: blur(10px);
    -webkit-backdrop-filter: blur(10px);
  }

  [class*="bg-accent"]:active { transform: scale(0.98); }
  button { transition: transform 0.15s ease, background-color 0.2s ease, border-color 0.2s ease, box-shadow 0.2s ease; }
</style>
</head>

<div id="modalRoot"></div>

<script>
(function () {
  'use strict';

  /* ---------------------------------- State ---------------------------------- */

  const STORAGE_KEY = 'pacVwceState_v1';
  const GOAL_COLORS = ['#10b981', '#6366f1', '#f59e0b', '#ec4899', '#06b6d4', '#f43f5e', '#84cc16', '#a855f7', '#eab308', '#38bdf8'];
  const MAX_PROJECTION_MONTHS = 720;

  const INFLATION_RATE = 0.02;
  const MC_ITERATIONS = 1000;
  const getTaxRate = () => (typeof state !== 'undefined' && state.settings && state.settings.taxRate != null) ? state.settings.taxRate : 0.26;
  const getStampDutyRate = () => (typeof state !== 'undefined' && state.settings && state.settings.stampDuty != null) ? state.settings.stampDuty : 0.002;
  const getSaleCostFlat = () => (typeof state !== 'undefined' && state.settings && state.settings.saleCost != null) ? state.settings.saleCost : 1.0;

  const DEFAULT_ASSETS = {
    'VWCE.DE': { ticker: 'VWCE.DE', name: 'Vanguard FTSE All-World (Acc)', isin: 'IE00BK5BQT80', price: 125.00, meanReturn: 0.07, volatility: 0.12, targetWeight: 0.0 },
    'SWDA.MI': { ticker: 'SWDA.MI', name: 'iShares Core MSCI World (Acc)', isin: 'IE00B4L5Y983', price: 95.00, meanReturn: 0.075, volatility: 0.13, targetWeight: 0.0 },
    'EIMI.MI': { ticker: 'EIMI.MI', name: 'iShares Core MSCI EM IMI (Acc)', isin: 'IE00BKM4GZ17', price: 32.00, meanReturn: 0.065, volatility: 0.15, targetWeight: 0.0 },
    'AGGH.MI': { ticker: 'AGGH.MI', name: 'iShares Core Global Aggregate Bond', isin: 'IE00BDBRDM35', price: 5.20, meanReturn: 0.03, volatility: 0.05, targetWeight: 0.0 }
  };

  function defaultState() {
    return {
      settings: {
        assets: JSON.parse(JSON.stringify(DEFAULT_ASSETS)),
        lastPriceUpdate: new Date().toISOString(),
        lastAutoCheck: '',
        taxRate: 0.26,
        stampDuty: 0.002,
        saleCost: 1.0,
        theme: 'glow',
        correlations: {
          'VWCE.DE_SWDA.MI': 0.95,
          'VWCE.DE_EIMI.MI': 0.80,
          'VWCE.DE_AGGH.MI': 0.10,
          'SWDA.MI_EIMI.MI': 0.75,
          'SWDA.MI_AGGH.MI': 0.10,
          'EIMI.MI_AGGH.MI': 0.15
        }
      },
      goals: [],
      transactions: [],
    };
  }

  let state = loadState();

  function sanitizeHistory(h) {
    if (!h || typeof h !== 'object' || !/^\d{4}-\d{2}$/.test(String(h.start || ''))) return null;
    if (!Array.isArray(h.returns) || h.returns.length < 12) return null;
    const returns = h.returns.map(v => parseFloat(v));
    if (returns.some(v => !isFinite(v) || v <= -1)) return null;
    return { start: String(h.start), returns };
  }

  function sanitizeAssets(rawAssets) {
    const sanitized = {};
    const source = (rawAssets && typeof rawAssets === 'object') ? rawAssets : DEFAULT_ASSETS;
    
    Object.keys(DEFAULT_ASSETS).forEach((k) => {
      sanitized[k] = JSON.parse(JSON.stringify(DEFAULT_ASSETS[k]));
    });

    Object.keys(source).forEach((k) => {
      const a = source[k];
      if (a && typeof a === 'object') {
        const ticker = String(a.ticker || k).trim().toUpperCase();
        if (ticker) {
          sanitized[ticker] = {
            ticker,
            name: String(a.name || ticker).trim(),
            isin: String(a.isin || '').trim().toUpperCase(),
            price: Math.max(0.0001, parseFloat(a.price) || 100),
            meanReturn: Math.max(-0.99, parseFloat(a.meanReturn != null ? a.meanReturn : 0.07)),
            volatility: Math.max(0.0001, parseFloat(a.volatility != null ? a.volatility : 0.12)),
            targetWeight: Math.max(0, Math.min(1.0, parseFloat(a.targetWeight) || 0.0)),
            holdings: Array.isArray(a.holdings) ? a.holdings.map(h => ({ name: String(h.name || '').trim(), weight: parseFloat(h.weight) || 0 })) : [],
            geographic: (a.geographic && typeof a.geographic === 'object') ? a.geographic : {},
            sector: (a.sector && typeof a.sector === 'object') ? a.sector : {},
            history: sanitizeHistory(a.history),
          };
        }
      }
    });
    return sanitized;
  }

  function loadState() {
    try {
      const raw = localStorage.getItem(STORAGE_KEY);
      if (!raw) return defaultState();
      const parsed = JSON.parse(raw);

      // Migrazione anagrafica titoli pregressa
      let assets = sanitizeAssets(parsed.settings && parsed.settings.assets ? parsed.settings.assets : null);
      if (parsed.settings && parsed.settings.currentPrice && !parsed.settings.assets) {
        if (assets['VWCE.DE']) {
          assets['VWCE.DE'].price = parseFloat(parsed.settings.currentPrice) || 125.00;
        }
      }

      const goals = (Array.isArray(parsed.goals) ? parsed.goals : []).map((g) => ({
        id: g.id || uid(),
        name: String(g.name || 'Obiettivo').trim(),
        targetAmount: Math.max(0.01, parseFloat(g.targetAmount) || 1000),
        monthlyContribution: Math.max(0, parseFloat(g.monthlyContribution) || 0),
        startDate: g.startDate || new Date().toISOString().slice(0, 10),
        color: g.color || GOAL_COLORS[0],
        assetTicker: g.assetTicker || 'VWCE.DE',
      }));

      const transactions = (Array.isArray(parsed.transactions) ? parsed.transactions : []).map((t) => ({
        id: t.id || uid(),
        goalId: t.goalId,
        date: t.date || new Date().toISOString().slice(0, 10),
        type: t.type || 'PAC',
        grossAmount: Math.max(0.01, parseFloat(t.grossAmount != null ? t.grossAmount : t.amount) || 0.01),
        fees: Math.max(0, parseFloat(t.fees) || 0),
        price: Math.max(0.0001, parseFloat(t.price) || 100),
        quotas: Math.max(0, parseFloat(t.quotas) || 0),
        assetTicker: t.assetTicker || gTickerForId(t.goalId, goals),
      }));

      const finalSettings = Object.assign(defaultState().settings, parsed.settings || {}, { assets });
      if (!finalSettings.theme) finalSettings.theme = 'glow';

      return Object.assign(defaultState(), parsed, {
        settings: finalSettings,
        goals,
        transactions,
      });
    } catch (e) {
      console.error('Stato corrotto, ripristino default.', e);
      return defaultState();
    }
  }

  function gTickerForId(goalId, goals) {
    const g = goals.find((x) => x.id === goalId);
    return g ? g.assetTicker || 'VWCE.DE' : 'VWCE.DE';
  }

  function saveState() {
    state.settings.lastModified = new Date().toISOString();
    localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
    scheduleAutoCloudSave();
  }

  /* ---------------------------------- Sincronizzazione Cloud (GitHub Gist) ----------------------------------
     I dati vengono salvati in un Gist PRIVATO sull'account GitHub dell'utente, così PC e telefono
     condividono lo stesso backup. La configurazione (token) resta solo sul dispositivo: è salvata
     in una chiave localStorage separata, esclusa da backup/ripristino. */

  const SYNC_KEY = 'pacSyncConfig_v1';
  const GIST_FILENAME = 'pac-vwce-tracker-backup.json';

  function getSyncConfig() {
    try { return JSON.parse(localStorage.getItem(SYNC_KEY)) || {}; } catch (e) { return {}; }
  }
  function saveSyncConfig(cfg) {
    localStorage.setItem(SYNC_KEY, JSON.stringify(cfg));
  }

  function gistHeaders(token) {
    return {
      'Authorization': 'Bearer ' + token,
      'Accept': 'application/vnd.github+json',
      'Content-Type': 'application/json'
    };
  }

  async function findExistingGist(token) {
    const res = await fetch('https://api.github.com/gists?per_page=100', { headers: gistHeaders(token) });
    if (!res.ok) throw new Error('HTTP ' + res.status);
    const gists = await res.json();
    const found = gists.find(g => g.files && g.files[GIST_FILENAME]);
    return found ? found.id : null;
  }

  // Se il gist non era ancora stato creato quando il dispositivo si è collegato,
  // riprova a cercarlo (es. telefono collegato prima del primo salvataggio dal PC).
  async function ensureGistId(cfg) {
    if (cfg.gistId) return cfg.gistId;
    const found = await findExistingGist(cfg.token);
    if (found) {
      cfg.gistId = found;
      saveSyncConfig(cfg);
    }
    return cfg.gistId;
  }

  async function connectCloud(token) {
    const userRes = await fetch('https://api.github.com/user', { headers: gistHeaders(token) });
    if (userRes.status === 401) throw new Error('Token non valido o scaduto');
    if (!userRes.ok) throw new Error('Errore GitHub (HTTP ' + userRes.status + ')');
    const user = await userRes.json();
    const gistId = await findExistingGist(token);
    const cfg = { token, gistId, username: user.login, auto: true, lastSync: null };
    saveSyncConfig(cfg);
    return { username: user.login, foundExisting: !!gistId };
  }

  function disconnectCloud() {
    localStorage.removeItem(SYNC_KEY);
  }

  async function cloudSave(silent) {
    const cfg = getSyncConfig();
    if (!cfg.token) { if (!silent) toast('Configura prima la sincronizzazione in Impostazioni', 'err'); return false; }
    try {
      const payload = { app: 'pac-vwce-tracker', savedAt: new Date().toISOString(), state };
      const body = JSON.stringify({
        description: 'Backup PAC Multi-Obiettivo (sincronizzazione automatica)',
        public: false,
        files: { [GIST_FILENAME]: { content: JSON.stringify(payload) } }
      });
      await ensureGistId(cfg).catch(() => {});
      let res = null;
      if (cfg.gistId) {
        res = await fetch('https://api.github.com/gists/' + cfg.gistId, { method: 'PATCH', headers: gistHeaders(cfg.token), body });
        if (res.status === 404) { cfg.gistId = null; }
      }
      if (!cfg.gistId) {
        res = await fetch('https://api.github.com/gists', { method: 'POST', headers: gistHeaders(cfg.token), body });
        if (res.ok) {
          const created = await res.json();
          cfg.gistId = created.id;
        }
      }
      if (!res || !res.ok) throw new Error('HTTP ' + (res ? res.status : '?'));
      cfg.lastSync = new Date().toISOString();
      saveSyncConfig(cfg);
      updateCloudHeaderBtn();
      if (!silent) toast('Dati salvati sul cloud ✓');
      const label = document.getElementById('syncLastLabel');
      if (label) label.textContent = fmtDateTime(cfg.lastSync);
      return true;
    } catch (err) {
      console.error('Cloud save fallito', err);
      if (!silent) toast('Salvataggio cloud fallito: ' + err.message, 'err');
      return false;
    }
  }

  async function fetchCloudPayload(cfg) {
    const res = await fetch('https://api.github.com/gists/' + cfg.gistId, { headers: gistHeaders(cfg.token) });
    if (!res.ok) throw new Error('HTTP ' + res.status);
    const gist = await res.json();
    const file = gist.files && gist.files[GIST_FILENAME];
    if (!file) throw new Error('Backup non trovato nel gist');
    let content = file.content;
    if (file.truncated) {
      const rawRes = await fetch(file.raw_url);
      if (!rawRes.ok) throw new Error('HTTP ' + rawRes.status);
      content = await rawRes.text();
    }
    const payload = JSON.parse(content);
    if (!payload || !payload.state) throw new Error('Contenuto del backup non valido');
    return payload;
  }

  function applyCloudPayload(payload) {
    const cfg = getSyncConfig();
    cfg.lastSync = new Date().toISOString();
    saveSyncConfig(cfg);
    localStorage.setItem(STORAGE_KEY, JSON.stringify(payload.state));
    location.reload();
  }

  async function cloudLoad() {
    const cfg = getSyncConfig();
    if (!cfg.token) { toast('Configura prima la sincronizzazione in Impostazioni', 'err'); return; }
    try {
      await ensureGistId(cfg);
      if (!cfg.gistId) { toast('Nessun backup cloud trovato: salva prima da uno dei dispositivi', 'err'); return; }
      const payload = await fetchCloudPayload(cfg);
      const when = payload.savedAt ? fmtDateTime(payload.savedAt) : 'data sconosciuta';
      openConfirm(
        'Ripristinare dal cloud?',
        `I dati di questo dispositivo verranno sostituiti con il salvataggio cloud del ${when}. L'operazione non è reversibile.`,
        () => applyCloudPayload(payload),
        true
      );
    } catch (err) {
      console.error('Cloud load fallito', err);
      toast('Caricamento cloud fallito: ' + err.message, 'err');
    }
  }

  let autoCloudTimer = null;
  function scheduleAutoCloudSave() {
    const cfg = getSyncConfig();
    if (!cfg.token || !cfg.auto) return;
    // Protezione: un dispositivo appena configurato (senza obiettivi né transazioni) non deve
    // sovrascrivere il backup cloud con dati vuoti. Il salvataggio manuale resta sempre possibile.
    if (state.goals.length === 0 && state.transactions.length === 0) return;
    clearTimeout(autoCloudTimer);
    autoCloudTimer = setTimeout(() => { cloudSave(true); }, 4000);
  }

  async function checkCloudOnStartup() {
    const cfg = getSyncConfig();
    if (!cfg.token) return;
    try {
      await ensureGistId(cfg);
      if (!cfg.gistId) return;
      const payload = await fetchCloudPayload(cfg);
      const cloudAt = payload.savedAt ? new Date(payload.savedAt).getTime() : 0;
      const localAt = state.settings.lastModified ? new Date(state.settings.lastModified).getTime() : 0;
      // Margine di 90s per tollerare piccoli disallineamenti di orologio tra dispositivi
      if (cloudAt > localAt + 90000) {
        openConfirm(
          'Trovati dati più recenti sul cloud',
          `Sul cloud c'è un salvataggio del ${fmtDateTime(payload.savedAt)}, più recente dei dati su questo dispositivo. Vuoi caricarlo? (Annulla per continuare con i dati locali)`,
          () => applyCloudPayload(payload),
          false
        );
      }
    } catch (err) {
      console.warn('Controllo cloud all\'avvio non riuscito', err);
    }
  }

  function updateCloudHeaderBtn() {
    const btn = document.getElementById('cloudSaveBtn');
    if (!btn) return;
    const cfg = getSyncConfig();
    btn.classList.toggle('hidden', !cfg.token);
    btn.classList.toggle('flex', !!cfg.token);
  }

  function fmtDateTime(iso) {
    try {
      return new Date(iso).toLocaleString('it-IT', { day: '2-digit', month: '2-digit', year: 'numeric', hour: '2-digit', minute: '2-digit' });
    } catch (e) { return String(iso); }
  }

  function uid() {
    return Date.now().toString(36) + Math.random().toString(36).slice(2, 8);
  }

  /* ---------------------------------- Utils ---------------------------------- */

  function parseLocalDate(d) {
    if (typeof d === 'string' && d.match(/^\d{4}-\d{2}-\d{2}$/)) {
      return new Date(d + 'T00:00:00');
    }
    return new Date(d);
  }

  const fmtEUR = new Intl.NumberFormat('it-IT', { style: 'currency', currency: 'EUR', maximumFractionDigits: 2 });
  const fmtEUR0 = new Intl.NumberFormat('it-IT', { style: 'currency', currency: 'EUR', maximumFractionDigits: 0 });
  const fmtPct = (n) => (n >= 0 ? '+' : '') + n.toFixed(2) + '%';
  const fmtQuotas = (n) => n.toLocaleString('it-IT', { minimumFractionDigits: 4, maximumFractionDigits: 6 });
  const fmtDate = (d) => parseLocalDate(d).toLocaleDateString('it-IT', { day: '2-digit', month: 'short', year: 'numeric' });
  const fmtMonthYear = (d) => parseLocalDate(d).toLocaleDateString('it-IT', { month: 'short', year: 'numeric' });
  const escapeHtml = (s) => String(s).replace(/[&<>"']/g, (c) => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c]));

  /* ---------------------------------- Palette grafici per-tema ----------------------------------
     Legge i colori direttamente dalle CSS custom properties del tema attivo (definite in <style>),
     cosi' i grafici Chart.js restano sempre coerenti con l'aspetto scelto senza duplicare valori. */
  function cssVar(name) {
    return getComputedStyle(document.body).getPropertyValue(name).trim();
  }
  function chartTheme() {
    return {
      grid: cssVar('--chart-grid'),
      tick: cssVar('--chart-tick'),
      legend: cssVar('--chart-legend'),
      tooltipBg: cssVar('--chart-tooltip-bg'),
      tooltipBorder: cssVar('--chart-tooltip-border'),
      tooltipTitle: cssVar('--chart-tooltip-title'),
      tooltipBody: cssVar('--chart-tooltip-body'),
      invested: cssVar('--chart-invested'),
      value: cssVar('--chart-value'),
      valueFill: cssVar('--chart-value-fill'),
      real: cssVar('--chart-real'),
      doughnutBorder: cssVar('--chart-doughnut-border'),
      pessimist: cssVar('--chart-pessimist'),
      median: cssVar('--chart-median'),
      optimist: cssVar('--chart-optimist'),
      compareInvested: cssVar('--chart-compare-invested'),
    };
  }

  function toast(msg, kind) {
    kind = kind || 'ok';
    const colors = { ok: 'border-accent/40 text-accent', err: 'border-rose-500/40 text-rose-400', info: 'border-sky-500/40 text-sky-400' };
    const el = document.createElement('div');
    el.className = 'pointer-events-auto card ' + (colors[kind] || colors.ok) + ' px-4 py-3 rounded-xl text-sm font-medium shadow-lg fade-in max-w-xs';
    el.textContent = msg;
    document.getElementById('toast-root').appendChild(el);
    setTimeout(() => { el.style.opacity = '0'; el.style.transition = 'opacity .3s'; setTimeout(() => el.remove(), 300); }, 2800);
  }

  /* ---------------------------------- Calcoli PAC ---------------------------------- */

  function goalColor(goal) {
    const idx = state.goals.findIndex((g) => g.id === goal.id);
    return goal.color || GOAL_COLORS[idx % GOAL_COLORS.length] || GOAL_COLORS[0];
  }

  function goalTransactions(goalId) {
    return state.transactions.filter((t) => t.goalId === goalId).sort((a, b) => new Date(a.date) - new Date(b.date));
  }

  function calculateXIRR(txs, currentValue) {
    if (txs.length === 0 || currentValue <= 0) return 0;
    
    const cashFlows = [];
    txs.forEach(t => {
      cashFlows.push({
        amount: -t.grossAmount,
        date: new Date(t.date + 'T00:00:00')
      });
    });
    
    cashFlows.push({
      amount: currentValue,
      date: new Date()
    });

    cashFlows.sort((a, b) => a.date - b.date);

    const firstDate = cashFlows[0].date;
    const totalDays = (new Date() - firstDate) / (1000 * 60 * 60 * 24);
    
    if (totalDays < 30) {
      const totalInvested = txs.reduce((s, t) => s + t.grossAmount, 0);
      return totalInvested > 0 ? ((currentValue - totalInvested) / totalInvested) * 100 : 0;
    }

    function npv(r) {
      let sum = 0;
      for (let i = 0; i < cashFlows.length; i++) {
        const days = (cashFlows[i].date - firstDate) / (1000 * 60 * 60 * 24);
        sum += cashFlows[i].amount / Math.pow(1 + r, days / 365);
      }
      return sum;
    }

    function npvDerivative(r) {
      let sum = 0;
      for (let i = 0; i < cashFlows.length; i++) {
        const days = (cashFlows[i].date - firstDate) / (1000 * 60 * 60 * 24);
        sum -= (days / 365) * cashFlows[i].amount * Math.pow(1 + r, -days / 365 - 1);
      }
      return sum;
    }

    let r = 0.1;
    const maxIterations = 100;
    const precision = 1e-6;

    for (let iter = 0; iter < maxIterations; iter++) {
      const val = npv(r);
      const deriv = npvDerivative(r);
      if (Math.abs(deriv) < 1e-12) break;
      
      const nextR = r - val / deriv;
      if (Math.abs(nextR - r) < precision) {
        return nextR * 100;
      }
      r = nextR;
      if (Math.abs(r) > 15) break;
    }
    
    const totalInvested = txs.reduce((s, t) => s + t.grossAmount, 0);
    return totalInvested > 0 ? ((currentValue - totalInvested) / totalInvested) * 100 : 0;
  }

  function computeGoalStats(goal) {
    const txs = goalTransactions(goal.id);
    const totalInvested = txs.reduce((s, t) => s + t.grossAmount, 0);
    const totalQuotas = txs.reduce((s, t) => s + t.quotas, 0);
    const assetTicker = goal.assetTicker || 'VWCE.DE';
    const asset = state.settings.assets[assetTicker] || state.settings.assets['VWCE.DE'] || { price: 125.00 };
    const currentValue = totalQuotas * asset.price;
    const gain = currentValue - totalInvested;
    const gainPct = totalInvested > 0 ? (gain / totalInvested) * 100 : 0;
    const pmc = totalQuotas > 0 ? totalInvested / totalQuotas : 0;
    const progressPct = goal.targetAmount > 0 ? Math.min(100, (currentValue / goal.targetAmount) * 100) : 0;
    const xirr = calculateXIRR(txs, currentValue);
    return { totalInvested, totalQuotas, currentValue, gain, gainPct, pmc, progressPct, txCount: txs.length, xirr };
  }

  function dateAfterMonths(months) {
    const d = new Date();
    d.setDate(15);
    d.setMonth(d.getMonth() + months);
    return d;
  }

  /* ---------------------------------- Simulazione Monte Carlo ---------------------------------- */

  function gaussianRandom() {
    let u = 0, v = 0;
    while (u === 0) u = Math.random();
    while (v === 0) v = Math.random();
    return Math.sqrt(-2 * Math.log(u)) * Math.cos(2 * Math.PI * v);
  }

  function isLeapYear(year) {
    return (year % 4 === 0 && year % 100 !== 0) || year % 400 === 0;
  }

  function percentileSorted(sortedArr, p) {
    if (sortedArr.length === 0) return 0;
    const idx = Math.min(sortedArr.length - 1, Math.max(0, Math.floor((p / 100) * sortedArr.length)));
    return sortedArr[idx];
  }

  function estimateDeterministicMonths(goal) {
    const stats = computeGoalStats(goal);
    if (stats.currentValue >= goal.targetAmount) return 0;
    if (stats.currentValue <= 0 && goal.monthlyContribution <= 0) return MAX_PROJECTION_MONTHS;
    
    const assetTicker = goal.assetTicker || 'VWCE.DE';
    const asset = state.settings.assets[assetTicker] || state.settings.assets['VWCE.DE'] || { meanReturn: 0.07 };
    
    const monthlyMeanRate = Math.pow(1 + Math.max(-0.99, asset.meanReturn), 1 / 12) - 1;
    let value = stats.currentValue;
    let months = 0;
    while (value < goal.targetAmount && months < MAX_PROJECTION_MONTHS) {
      value = value * (1 + monthlyMeanRate) + goal.monthlyContribution;
      months++;
      if (goal.monthlyContribution <= 0 && monthlyMeanRate <= 0) break;
    }
    return months;
  }

  /* ---------------------------------- Decomposizione di Cholesky per Shocks Correlati ---------------------------------- */

  function getAssetClass(ticker) {
    const t = String(ticker).toUpperCase();
    if (t.includes('AGGH') || t.includes('BOND') || t.includes('GLAG') || t.includes('EMB') || t.includes('IEAC')) {
      return 'bond';
    }
    return 'equity';
  }

  function getCorrelation(t1, t2) {
    if (t1 === t2) return 1.0;
    const key1 = `${t1}_${t2}`;
    const key2 = `${t2}_${t1}`;
    
    if (state.settings.correlations) {
      if (state.settings.correlations[key1] !== undefined) return state.settings.correlations[key1];
      if (state.settings.correlations[key2] !== undefined) return state.settings.correlations[key2];
    }
    
    // Default basati sulle classi di asset
    const c1 = getAssetClass(t1);
    const c2 = getAssetClass(t2);
    if (c1 === 'equity' && c2 === 'equity') return 0.80;
    if (c1 === 'bond' && c2 === 'bond') return 0.40;
    return 0.10; // Azioni e Obbligazioni
  }

  function computeCholesky(tickers) {
    const n = tickers.length;
    const corr = Array.from({ length: n }, () => new Float64Array(n));
    for (let i = 0; i < n; i++) {
      for (let j = 0; j < n; j++) {
        corr[i][j] = getCorrelation(tickers[i], tickers[j]);
      }
    }

    const L = Array.from({ length: n }, () => new Float64Array(n));
    for (let i = 0; i < n; i++) {
      for (let j = 0; j <= i; j++) {
        let sum = 0;
        for (let k = 0; k < j; k++) {
          sum += L[i][k] * L[j][k];
        }
        if (i === j) {
          L[i][j] = Math.sqrt(Math.max(0, 1.0 - sum));
        } else {
          L[i][j] = L[j][j] > 0 ? (corr[i][j] - sum) / L[j][j] : 0;
        }
      }
    }
    return L;
  }

  let cachedCholesky = null;
  function getCholeskyMatrix() {
    const tickers = Object.keys(state.settings.assets);
    const key = tickers.join('|');
    if (cachedCholesky && cachedCholesky.key === key) return cachedCholesky.L;
    const L = computeCholesky(tickers);
    cachedCholesky = { key, L };
    return L;
  }

  let sharedShocks = null;
  function getSharedShocks(horizonMonths) {
    const tickers = Object.keys(state.settings.assets);
    const n = tickers.length;
    const key = horizonMonths + '|' + MC_ITERATIONS + '|' + tickers.join(',');
    if (sharedShocks && sharedShocks.key === key) return sharedShocks.shocks;
    
    const shocks = [];
    for (let it = 0; it < MC_ITERATIONS; it++) {
      const shockIt = [];
      for (let m = 0; m < horizonMonths; m++) {
        const normals = new Float64Array(n);
        for (let i = 0; i < n; i++) {
          normals[i] = Math.max(-4.0, Math.min(4.0, gaussianRandom())); // Clip shocks for stability
        }
        shockIt.push(normals);
      }
      shocks.push(shockIt);
    }
    sharedShocks = { key, shocks };
    return shocks;
  }

  function getAssetGrowthPaths(horizonMonths, assetTicker) {
    const asset = state.settings.assets[assetTicker] || state.settings.assets['VWCE.DE'] || { meanReturn: 0.07, volatility: 0.12 };
    const tickers = Object.keys(state.settings.assets);
    const idx = tickers.indexOf(assetTicker);
    
    if (idx === -1) {
      const annualDrift = Math.log(1 + Math.max(-0.99, asset.meanReturn));
      const monthlyDrift = annualDrift / 12;
      const monthlyVol = asset.volatility / Math.sqrt(12);
      const paths = [];
      for (let it = 0; it < MC_ITERATIONS; it++) {
        const path = new Float64Array(horizonMonths);
        for (let m = 0; m < horizonMonths; m++) {
          path[m] = Math.exp(monthlyDrift - 0.5 * monthlyVol * monthlyVol + monthlyVol * gaussianRandom());
        }
        paths.push(path);
      }
      return paths;
    }

    const shocks = getSharedShocks(horizonMonths);
    const L = getCholeskyMatrix();
    
    const annualDrift = Math.log(1 + Math.max(-0.99, asset.meanReturn));
    const monthlyDrift = annualDrift / 12;
    const monthlyVol = asset.volatility / Math.sqrt(12);
    
    const paths = [];
    for (let it = 0; it < MC_ITERATIONS; it++) {
      const shockIt = shocks[it];
      const path = new Float64Array(horizonMonths);
      for (let m = 0; m < horizonMonths; m++) {
        let corrShock = 0;
        for (let k = 0; k <= idx; k++) {
          corrShock += L[idx][k] * shockIt[m][k];
        }
        path[m] = Math.exp(monthlyDrift - 0.5 * monthlyVol * monthlyVol + monthlyVol * corrShock);
      }
      paths.push(path);
    }
    return paths;
  }

  /* ---------------------------------- Dati Storici 2016-2025 per Backtester ---------------------------------- */

  const HISTORICAL_YEARS = [2016, 2017, 2018, 2019, 2020, 2021, 2022, 2023, 2024, 2025];
  const HISTORICAL_RETURNS = {
    'VWCE.DE': [0.096, 0.089, -0.048, 0.289, 0.063, 0.276, -0.132, 0.181, 0.224, 0.115],
    'SWDA.MI': [0.107, 0.075, -0.041, 0.300, 0.065, 0.311, -0.128, 0.196, 0.238, 0.121],
    'EIMI.MI': [0.145, 0.206, -0.102, 0.184, 0.085, 0.019, -0.155, 0.061, 0.098, 0.045],
    'AGGH.MI': [0.021, 0.005, 0.004, 0.052, 0.042, -0.033, -0.125, 0.048, 0.055, 0.025]
  };

  // Variazione annua reale del cambio EUR/USD 2016-2025 (positivo = apprezzamento Euro)
  const FX_YEARLY_EURUSD = [-0.032, 0.141, -0.044, -0.022, 0.089, -0.069, -0.058, 0.031, -0.03, 0.015];

  function getHistoricalMonthlyReturns(ticker) {
    const isBond = getAssetClass(ticker) === 'bond';
    const proxyTicker = isBond ? 'AGGH.MI' : 'VWCE.DE';
    const yearly = HISTORICAL_RETURNS[ticker] || HISTORICAL_RETURNS[proxyTicker];
    const asset = state.settings.assets[ticker] || { volatility: isBond ? 0.05 : 0.12 };
    const vol = asset.volatility / Math.sqrt(12);
    
    const monthly = [];
    let seed = 42; // Deterministic pseudo-randomness for offline exact backtesting
    function sRandom() {
      const x = Math.sin(seed++) * 10000;
      return x - Math.floor(x);
    }
    function sGaussian() {
      let u = 0, v = 0;
      while (u === 0) u = sRandom();
      while (v === 0) v = sRandom();
      return Math.sqrt(-2 * Math.log(u)) * Math.cos(2 * Math.PI * v);
    }

    for (let y = 0; y < yearly.length; y++) {
      const R = yearly[y];
      const targetProduct = 1 + R;
      const monthlyMean = Math.pow(targetProduct, 1 / 12);
      
      const shocks = new Float64Array(12);
      let sumShocks = 0;
      for (let m = 0; m < 12; m++) {
        shocks[m] = sGaussian() * vol;
        sumShocks += shocks[m];
      }
      for (let m = 0; m < 12; m++) {
        shocks[m] -= sumShocks / 12;
      }

      let currentProduct = 1;
      const tempReturns = new Float64Array(12);
      for (let m = 0; m < 12; m++) {
        tempReturns[m] = monthlyMean * Math.exp(shocks[m]) - 1;
        currentProduct *= (1 + tempReturns[m]);
      }
      
      const factor = Math.pow(targetProduct / currentProduct, 1 / 12);
      for (let m = 0; m < 12; m++) {
        const r = (1 + tempReturns[m]) * factor - 1;
        monthly.push(r);
      }
    }
    return monthly;
  }

  // Serie mensile per un titolo: storico reale caricato dall'utente se disponibile,
  // altrimenti serie sintetica calibrata sui rendimenti annuali 2016-2025.
  function getReturnSeries(ticker) {
    const asset = state.settings.assets[ticker];
    if (asset && asset.history && Array.isArray(asset.history.returns) && asset.history.returns.length >= 12) {
      const parts = asset.history.start.split('-');
      return {
        returns: asset.history.returns,
        startYear: parseInt(parts[0]),
        startMonth: parseInt(parts[1]) - 1,
        real: true
      };
    }
    return { returns: getHistoricalMonthlyReturns(ticker), startYear: 2016, startMonth: 0, real: false };
  }

  function simulateGoalSeries(goal, sharedPaths, horizonMonths) {
    const stats = computeGoalStats(goal);
    const target = goal.targetAmount;
    const contribution = goal.monthlyContribution;
    const iterations = sharedPaths.length;
    const seriesByIteration = new Array(iterations);
    const reachedList = new Array(iterations);
    for (let it = 0; it < iterations; it++) {
      const path = sharedPaths[it];
      const series = new Float64Array(horizonMonths + 1);
      let value = stats.currentValue;
      series[0] = value;
      let reached = value >= target ? 0 : null;
      for (let m = 1; m <= horizonMonths; m++) {
        // Continuous contributions (does not stop at target to project full portfolio growth)
        value = value * path[m - 1] + contribution;
        if (reached === null && value >= target) reached = m;
        series[m] = value;
      }
      seriesByIteration[it] = series;
      reachedList[it] = reached;
    }
    return { seriesByIteration, reachedList };
  }

  function summarizeBandsFromSeries(seriesByIteration, horizonMonths) {
    const bands = [];
    for (let m = 0; m <= horizonMonths; m++) {
      const vals = seriesByIteration.map((s) => s[m]).sort((a, b) => a - b);
      const p50 = percentileSorted(vals, 50);
      bands.push({
        month: m,
        p10: percentileSorted(vals, 10),
        p50,
        p90: percentileSorted(vals, 90),
        realP50: p50 / Math.pow(1 + INFLATION_RATE, m / 12),
      });
    }
    return bands;
  }

  function summarizeReached(reachedList) {
    const successList = reachedList.filter((m) => m !== null);
    const successProbability = (successList.length / reachedList.length) * 100;
    const sortedSuccess = successList.slice().sort((a, b) => a - b);
    const medianMonthToTarget = sortedSuccess.length > 0 ? percentileSorted(sortedSuccess, 50) : null;
    return { successProbability, medianMonthToTarget };
  }

  let mcResultCache = null;

  function computeMonteCarloForAllGoals() {
    if (state.goals.length === 0) return null;

    let horizonMonths = 24;
    state.goals.forEach((g) => {
      const est = estimateDeterministicMonths(g);
      horizonMonths = Math.max(horizonMonths, Math.min(MAX_PROJECTION_MONTHS, Math.round(est * 1.4) + 12));
    });
    horizonMonths = Math.min(horizonMonths, 360);

    const totalSeriesByIteration = Array.from({ length: MC_ITERATIONS }, () => new Float64Array(horizonMonths + 1));
    const perGoal = {};

    state.goals.forEach((g) => {
      const assetTicker = g.assetTicker || 'VWCE.DE';
      const sharedPaths = getAssetGrowthPaths(horizonMonths, assetTicker);
      const { seriesByIteration, reachedList } = simulateGoalSeries(g, sharedPaths, horizonMonths);
      for (let it = 0; it < MC_ITERATIONS; it++) {
        const s = seriesByIteration[it];
        const t = totalSeriesByIteration[it];
        for (let m = 0; m <= horizonMonths; m++) t[m] += s[m];
      }
      const bands = summarizeBandsFromSeries(seriesByIteration, horizonMonths);
      const { successProbability, medianMonthToTarget } = summarizeReached(reachedList);
      perGoal[g.id] = { bands, successProbability, medianMonthToTarget, horizonMonths };
    });

    const totalBands = summarizeBandsFromSeries(totalSeriesByIteration, horizonMonths);
    return { perGoal, totalBands, horizonMonths };
  }

  function getMonteCarloResult() {
    const key = JSON.stringify({ goals: state.goals, txs: state.transactions, assets: state.settings.assets, correlations: state.settings.correlations });
    if (mcResultCache && mcResultCache.key === key) return mcResultCache.result;
    const result = computeMonteCarloForAllGoals();
    mcResultCache = { key, result };
    return result;
  }

  const FORECAST_HORIZON_MONTHS = 240;

  function computeForecastBands(contributionMultiplier) {
    const totalSeriesByIteration = Array.from({ length: MC_ITERATIONS }, () => new Float64Array(FORECAST_HORIZON_MONTHS + 1));
    state.goals.forEach((g) => {
      const assetTicker = g.assetTicker || 'VWCE.DE';
      const sharedPaths = getAssetGrowthPaths(FORECAST_HORIZON_MONTHS, assetTicker);
      const adjustedGoal = Object.assign({}, g, { monthlyContribution: g.monthlyContribution * contributionMultiplier });
      const { seriesByIteration } = simulateGoalSeries(adjustedGoal, sharedPaths, FORECAST_HORIZON_MONTHS);
      for (let it = 0; it < MC_ITERATIONS; it++) {
        const s = seriesByIteration[it];
        const t = totalSeriesByIteration[it];
        for (let m = 0; m <= FORECAST_HORIZON_MONTHS; m++) t[m] += s[m];
      }
    });
    return summarizeBandsFromSeries(totalSeriesByIteration, FORECAST_HORIZON_MONTHS);
  }

  /* ---------------------------------- Ribilanciamento PAC ---------------------------------- */

  function computeOptimalRebalancing(assetsValues, targetWeights, contribution) {
    const n = assetsValues.length;
    const buy = new Float64Array(n);
    
    // Normalize target weights to ensure they sum to exactly 1.0 internally
    const sumWeights = targetWeights.reduce((s, w) => s + w, 0);
    const normWeights = targetWeights.map((w) => sumWeights > 0 ? w / sumWeights : 0);

    // Greedy water-filling: distribute the contribution in small increments (1000 steps)
    const steps = 1000;
    const dC = contribution / steps;
    const currentValues = [...assetsValues];
    
    for (let step = 0; step < steps; step++) {
      let minIdx = -1;
      let minRatio = Infinity;
      for (let i = 0; i < n; i++) {
        if (normWeights[i] > 0) {
          const ratio = currentValues[i] / normWeights[i];
          if (ratio < minRatio) {
            minRatio = ratio;
            minIdx = i;
          }
        }
      }
      if (minIdx !== -1) {
        currentValues[minIdx] += dC;
        buy[minIdx] += dC;
      } else {
        break;
      }
    }
    return buy;
  }

  /* ---------------------------------- Fiscalità: Valore di Liquidazione Netto ---------------------------------- */

  function computeNetLiquidationValue(goal) {
    const stats = computeGoalStats(goal);
    if (stats.totalQuotas <= 0) {
      return { grossValue: 0, capitalGain: 0, capitalGainTax: 0, stampDuty: 0, saleCost: 0, netValue: 0 };
    }
    const capitalGain = Math.max(0, stats.gain);
    const capitalGainTax = capitalGain * getTaxRate();

    const now = new Date();
    const year = now.getFullYear();
    const startOfYear = new Date(year, 0, 1);
    const daysElapsed = Math.floor((now - startOfYear) / 86400000) + 1;
    const totalDays = isLeapYear(year) ? 366 : 365;
    const stampDuty = stats.currentValue * getStampDutyRate() * (daysElapsed / totalDays);

    const saleCost = getSaleCostFlat();
    const netValue = Math.max(0, stats.currentValue - capitalGainTax - stampDuty - saleCost);

    return { grossValue: stats.currentValue, capitalGain, capitalGainTax, stampDuty, saleCost, netValue };
  }

  /* ---------------------------------- Navigazione ---------------------------------- */

  const VIEW_TITLES = { dashboard: 'Dashboard', goals: 'Obiettivi', forecast: 'Previsioni', transactions: 'Transazioni', tools: 'Strumenti', settings: 'Impostazioni' };

  /* ---------------------------------- Render: Dashboard ---------------------------------- */

    const totalGain = totalValue - totalInvested;

    const gainPositive = totalGain >= 0;

    const overallXirr = calculateXIRR(state.transactions, totalValue);

      }

  function renderTimelineChart() {
    destroyChart('timeline');
    const ctx = document.getElementById('chartTimeline');
    if (!ctx) return;

    const txs = [...state.transactions].sort((a, b) => new Date(a.date) - new Date(b.date));
    const historyDates = [];
    const historyInvested = [];
    const historyValue = [];
    
    let cumInvested = 0;
    const cumQuotasByAsset = {};
    
    txs.forEach((t) => {
      const assetTicker = t.assetTicker || 'VWCE.DE';
      if (!cumQuotasByAsset[assetTicker]) cumQuotasByAsset[assetTicker] = 0;
      
      cumInvested += t.grossAmount;
      cumQuotasByAsset[assetTicker] += t.quotas;
      
      historyDates.push(new Date(t.date));
      historyInvested.push(cumInvested);
      
      let totalVal = 0;
      Object.keys(cumQuotasByAsset).forEach((ticker) => {
        const price = (ticker === assetTicker) ? t.price : (state.settings.assets[ticker] ? state.settings.assets[ticker].price : 125.00);
        totalVal += cumQuotasByAsset[ticker] * price;
      });
      historyValue.push(totalVal);
    });

    const today = new Date();
    historyDates.push(today);
    historyInvested.push(cumInvested);
    
    let todayVal = 0;
    Object.keys(cumQuotasByAsset).forEach((ticker) => {
      const price = state.settings.assets[ticker] ? state.settings.assets[ticker].price : 125.00;
      todayVal += cumQuotasByAsset[ticker] * price;
    });
    historyValue.push(todayVal);
    const todayIndex = historyDates.length - 1;

    const mcData = getMonteCarloResult();
    const projRealSeries = [];

    if (mcData) {
      let projInvested = cumInvested;
      // I contributi mensili nella proiezione non si fermano al raggiungimento del target,
      // per restare coerenti con simulateGoalSeries() che proietta versamenti continui.
      const totalMonthlyContribution = state.goals.reduce((s, g) => s + g.monthlyContribution, 0);
      for (let m = 1; m <= mcData.horizonMonths; m++) {
        projInvested += totalMonthlyContribution;
        historyDates.push(dateAfterMonths(m));
        historyInvested.push(projInvested);
        historyValue.push(mcData.totalBands[m].p50);
        projRealSeries.push(mcData.totalBands[m].realP50);
      }
    }

    const historyLabels = historyDates.map((d) => fmtMonthYear(d));
    const fullRealSeries = new Array(todayIndex).fill(null).concat([historyValue[todayIndex]], projRealSeries);

    const ct = chartTheme();
    charts.timeline = new Chart(ctx, {
      type: 'line',
      data: {
        labels: historyLabels,
        datasets: [
          {
            label: 'Versato',
            data: historyInvested,
            borderColor: ct.invested,
            backgroundColor: ct.invested + '14',
            borderWidth: 2,
            pointRadius: 0,
            tension: 0.15,
            segment: { borderDash: (c) => (c.p0DataIndex >= todayIndex ? [5, 5] : undefined) },
          },
          {
            label: 'Valore stimato (mediana Monte Carlo)',
            data: historyValue,
            borderColor: ct.value,
            backgroundColor: ct.valueFill,
            borderWidth: 2.5,
            pointRadius: 0,
            fill: true,
            tension: 0.15,
            segment: { borderDash: (c) => (c.p0DataIndex >= todayIndex ? [5, 5] : undefined) },
          },
          {
            label: "Potere d'acquisto reale (infl. 2%)",
            data: fullRealSeries,
            borderColor: ct.real,
            borderWidth: 2,
            pointRadius: 0,
            borderDash: [4, 4],
            tension: 0.15,
            spanGaps: false,
          },
        ],
      },
      options: {
        responsive: true,
        maintainAspectRatio: false,
        interaction: { mode: 'index', intersect: false },
        plugins: {
          legend: { labels: { color: ct.legend, usePointStyle: true, boxWidth: 8, font: { size: 11 } } },
          tooltip: {
            backgroundColor: ct.tooltipBg, borderColor: ct.tooltipBorder, borderWidth: 1, titleColor: ct.tooltipTitle, bodyColor: ct.tooltipBody,
            callbacks: {
              title: (items) => historyLabels[items[0].dataIndex],
              label: (item) => item.dataset.label + ': ' + (item.raw == null ? '—' : fmtEUR.format(item.raw)),
            },
          },
        },
        scales: {
          x: { type: 'category', grid: { color: ct.grid }, ticks: { color: ct.tick, maxTicksLimit: 8, autoSkip: true } },
          y: { grid: { color: ct.grid }, ticks: { color: ct.tick, callback: (v) => fmtEUR0.format(v) } },
        },
      },
    });
  }

  function goalCard(g) {
    const color = goalColor(g);
    const stats = computeGoalStats(g);
    const mcData = getMonteCarloResult();
    const mc = mcData ? mcData.perGoal[g.id] : null;
    const gainPositive = stats.gain >= 0;

    const assetTicker = g.assetTicker || 'VWCE.DE';
    const asset = state.settings.assets[assetTicker] || state.settings.assets['VWCE.DE'] || { name: 'VWCE', price: 125.00 };

    let projectionText;
    if (stats.progressPct >= 100) {
      projectionText = 'Obiettivo raggiunto 🎉';
    } else if (!mc) {
      projectionText = 'Calcolo proiezione non disponibile';
    } else if (mc.medianMonthToTarget == null) {
      projectionText = `Non raggiunto nell'orizzonte simulato (${mc.horizonMonths} mesi) · probabilità di successo ${mc.successProbability.toFixed(0)}%`;
    } else {
      projectionText = `Mediana Monte Carlo: ${fmtMonthYear(dateAfterMonths(mc.medianMonthToTarget))} (${mc.medianMonthToTarget} mesi) · probabilità ${mc.successProbability.toFixed(0)}%`;
    }

    let realPowerValue = stats.currentValue;
    if (mc) {
      const refMonth = mc.medianMonthToTarget != null ? mc.medianMonthToTarget : mc.horizonMonths;
      if (mc.bands[refMonth]) realPowerValue = mc.bands[refMonth].realP50;
    }

    const projectionClass = stats.progressPct >= 100 ? 'text-xs font-semibold text-positive mb-4' : 'text-xs text-slate-400 mb-4';

    return `
      <div class="card goal-card rounded-2xl p-4 md:p-5">
        <div class="flex items-start gap-3 mb-3">
          <div class="w-3 h-3 rounded-full mt-1.5 shrink-0" style="background:${color}"></div>
          <div class="min-w-0 flex-1">
            <p class="font-bold text-white truncate">${escapeHtml(g.name)}</p>
            <p class="text-xs text-slate-400">Target ${fmtEUR.format(g.targetAmount)} · PAC ${fmtEUR.format(g.monthlyContribution)}/mese</p>
            <p class="text-[10px] text-slate-500 font-semibold mt-0.5">${escapeHtml(asset.name)} (${assetTicker}) · ${fmtEUR.format(asset.price)}</p>
          </div>
          <div class="flex gap-1 shrink-0">
            <button data-edit-goal="${g.id}" class="p-1.5 text-slate-400 hover:text-white rounded-lg hover:bg-base-800" title="Modifica">
              <svg xmlns="http://www.w3.org/2000/svg" class="w-4 h-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path stroke-linecap="round" stroke-linejoin="round" d="M11 4H6a2 2 0 0 0-2 2v12a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2v-5M18.5 2.5a2.12 2.12 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5Z"/></svg>
            </button>
            <button data-delete-goal="${g.id}" class="p-1.5 text-slate-400 hover:text-rose-400 rounded-lg hover:bg-base-800" title="Elimina">
              <svg xmlns="http://www.w3.org/2000/svg" class="w-4 h-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path stroke-linecap="round" stroke-linejoin="round" d="M3 6h18M8 6V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2m3 0-1 14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2L4 6h16Z"/></svg>
            </button>
          </div>
        </div>

        <div class="w-full h-2.5 rounded-full bg-base-800 progress-track overflow-hidden mb-2">
          <div class="h-full rounded-full transition-all" style="width:${stats.progressPct.toFixed(1)}%; background:${color}"></div>
        </div>
        <div class="flex justify-between items-baseline text-xs text-slate-400 mb-4">
          <span class="value-hero">${fmtEUR.format(stats.currentValue)} <span class="text-slate-600">/ ${fmtEUR.format(g.targetAmount)}</span></span>
          <span class="value-hero font-semibold" style="color:${color}">${stats.progressPct.toFixed(1)}%</span>
        </div>

        <div class="grid grid-cols-3 gap-2 mb-4 text-center">
          <div class="bg-base-800/60 rounded-xl py-2 px-1">
            <p class="text-[9px] text-slate-500 uppercase">Versato</p>
            <p class="text-xs font-bold text-slate-200">${fmtEUR0.format(stats.totalInvested)}</p>
          </div>
          <div class="bg-base-800/60 rounded-xl py-2 px-1">
            <p class="text-[9px] text-slate-500 uppercase">Rend. Sempl.</p>
            <p class="text-xs font-bold ${gainPositive ? 'text-positive' : 'text-negative'}">${fmtPct(stats.gainPct)}</p>
          </div>
          <div class="bg-base-800/60 rounded-xl py-2 px-1">
            <p class="text-[9px] text-slate-500 uppercase">Rend. MWR</p>
            <p class="text-xs font-bold ${stats.xirr >= 0 ? 'text-positive' : 'text-negative'}">${(stats.xirr >= 0 ? '+' : '') + stats.xirr.toFixed(1)}%</p>
          </div>
          <div class="bg-base-800/60 rounded-xl py-2 px-1">
            <p class="text-[9px] text-slate-500 uppercase">PMC</p>
            <p class="text-xs font-bold text-slate-200">${stats.pmc > 0 ? fmtEUR.format(stats.pmc) : '—'}</p>
          </div>
          <div class="bg-base-800/60 rounded-xl py-2 px-1">
            <p class="text-[9px] text-slate-500 uppercase">Pot. Reale</p>
            <p class="text-xs font-bold text-amber-400">${fmtEUR0.format(realPowerValue)}</p>
          </div>
          <div class="bg-base-800/60 rounded-xl py-2 px-1">
            <p class="text-[9px] text-slate-500 uppercase">Quote</p>
            <p class="text-xs font-bold text-slate-200">${stats.totalQuotas.toFixed(2)}</p>
          </div>
        </div>

        <p class="${projectionClass}">${projectionText}</p>

        <button data-add-tx-goal="${g.id}" class="w-full flex items-center justify-center gap-2 text-sm font-semibold py-2 rounded-xl border transition" style="border-color:${color}55; color:${color}">
          <svg xmlns="http://www.w3.org/2000/svg" class="w-3.5 h-3.5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path stroke-linecap="round" stroke-linejoin="round" d="M12 5v14m-7-7h14"/></svg>
          Aggiungi versamento
        </button>
      </div>`;
  }

  function renderCompareChart() {
    destroyChart('compare');
    const ctx = document.getElementById('chartCompare');

    const stats = state.goals.map((g) => computeGoalStats(g));
    const ct = chartTheme();
    charts.compare = new Chart(ctx, {
      type: 'bar',
      data: {
        labels: state.goals.map((g) => g.name),
        datasets: [
          { label: 'Versato', data: stats.map((s) => s.totalInvested), backgroundColor: ct.compareInvested, borderRadius: 6 },
          { label: 'Valore attuale', data: stats.map((s) => s.currentValue), backgroundColor: state.goals.map((g) => goalColor(g)), borderRadius: 6 },
        ],
      },
      options: {
        responsive: true,
        maintainAspectRatio: false,
        plugins: {
          legend: { labels: { color: ct.legend, usePointStyle: true, boxWidth: 8, font: { size: 11 } } },
          tooltip: {
            backgroundColor: ct.tooltipBg, borderColor: ct.tooltipBorder, borderWidth: 1, titleColor: ct.tooltipTitle, bodyColor: ct.tooltipBody,
            callbacks: { label: (item) => item.dataset.label + ': ' + fmtEUR.format(item.raw) },
          },
        },
        scales: {
          x: { grid: { display: false }, ticks: { color: ct.legend } },
          y: { grid: { color: ct.grid }, ticks: { color: ct.tick, callback: (v) => fmtEUR0.format(v) } },
        },

  }

  /* ---------------------------------- Render: Previsioni ---------------------------------- */

  function renderForecast() {
    const root = document.getElementById('view-forecast');
    destroyChart('forecast');

    if (state.goals.length === 0) {
      root.innerHTML = emptyState('Nessun obiettivo ancora', "Crea almeno un obiettivo per generare gli scenari stocastici a 20 anni.", 'Crea obiettivo');
      root.querySelector('#emptyCta').addEventListener('click', () => openGoalModal());
      return;
    }

    const baseMonthly = state.goals.reduce((s, g) => s + g.monthlyContribution, 0);

    root.innerHTML = `
      <div class="card rounded-2xl p-4 md:p-6">
        <h3 class="font-bold text-white text-sm md:text-base mb-1">Scenari stocastici a 20 anni</h3>
        <p class="text-xs text-slate-400 mb-4">Percentili della simulazione Monte Carlo sul valore totale del portafoglio: 10° (pessimista), 50° (mediano), 90° (ottimista)</p>
        <div class="h-72 md:h-96"><canvas id="chartForecast"></canvas></div>
      </div>
      <div class="card rounded-2xl p-4 md:p-6">
        <div class="flex flex-wrap items-center justify-between gap-2 mb-1">
          <label for="pacSlider" class="text-sm font-semibold text-white">Simula variazione PAC mensile complessivo</label>
          <span id="pacSliderValue" class="text-sm font-bold text-accent"></span>
        </div>
        <p class="text-xs text-slate-400 mb-4">Sposta lo slider per vedere istantaneamente come cambierebbero gli scenari se il versamento mensile totale (oggi ${fmtEUR.format(baseMonthly)}/mese) variasse</p>
        <input id="pacSlider" type="range" min="-100" max="200" step="5" value="0" class="w-full accent-emerald-500">
        <div class="flex justify-between text-[10px] text-slate-500 mt-1">
          <span>-100%</span><span>0%</span><span>+100%</span><span>+200%</span>
        </div>
      </div>
    `;

    const slider = root.querySelector('#pacSlider');
    const sliderValueLabel = root.querySelector('#pacSliderValue');

    function updateLabel(pct) {
      const newMonthly = baseMonthly * (1 + pct / 100);
      sliderValueLabel.textContent = (pct >= 0 ? '+' : '') + pct + '% → ' + fmtEUR.format(newMonthly) + '/mese';
    }

    updateLabel(0);
    drawForecastChart(0);

    slider.addEventListener('input', () => {
      const pct = parseInt(slider.value, 10);
      updateLabel(pct);
      drawForecastChart(pct);
    });
  }

  function drawForecastChart(pct) {
    const multiplier = Math.max(0, 1 + pct / 100);
    const bands = computeForecastBands(multiplier);
    const labels = bands.map((b) => fmtMonthYear(dateAfterMonths(b.month)));
    const p10 = bands.map((b) => b.p10);
    const p50 = bands.map((b) => b.p50);
    const p90 = bands.map((b) => b.p90);

    if (charts.forecast) {
      charts.forecast.data.labels = labels;
      charts.forecast.data.datasets[0].data = p10;
      charts.forecast.data.datasets[1].data = p50;
      charts.forecast.data.datasets[2].data = p90;
      charts.forecast.update('none');
      return;
    }

    const ctx = document.getElementById('chartForecast');
    if (!ctx) return;
    const ct = chartTheme();
    charts.forecast = new Chart(ctx, {
      type: 'line',
      data: {
        labels,
        datasets: [
          { label: 'Scenario pessimista (10°)', data: p10, borderColor: ct.pessimist, backgroundColor: ct.pessimist + '14', borderWidth: 2, pointRadius: 0, tension: 0.15 },
          { label: 'Scenario mediano (50°)', data: p50, borderColor: ct.median, backgroundColor: ct.median + '14', borderWidth: 2.5, pointRadius: 0, tension: 0.15 },
          { label: 'Scenario ottimista (90°)', data: p90, borderColor: ct.optimist, backgroundColor: ct.optimist + '14', borderWidth: 2, pointRadius: 0, tension: 0.15 },
        ],
      },
      options: {
        responsive: true,
        maintainAspectRatio: false,
        animation: false,
        interaction: { mode: 'index', intersect: false },
        plugins: {
          legend: { labels: { color: ct.legend, usePointStyle: true, boxWidth: 8, font: { size: 11 } } },
          tooltip: {
            backgroundColor: ct.tooltipBg, borderColor: ct.tooltipBorder, borderWidth: 1, titleColor: ct.tooltipTitle, bodyColor: ct.tooltipBody,
            callbacks: {
              title: (items) => charts.forecast.data.labels[items[0].dataIndex],
              label: (item) => item.dataset.label + ': ' + fmtEUR.format(item.raw),
            },
          },
        },
        scales: {
          x: { type: 'category', grid: { color: ct.grid }, ticks: { color: ct.tick, maxTicksLimit: 10, autoSkip: true } },
          y: { grid: { color: ct.grid }, ticks: { color: ct.tick, callback: (v) => fmtEUR0.format(v) } },
        },
      },
    });
  }

  function runBacktest() {
    const asset = document.getElementById('btAsset').value;
    const startMonth = parseInt(document.getElementById('btStartMonth').value);
    const startYear = parseInt(document.getElementById('btStartYear').value);
    const endMonth = parseInt(document.getElementById('btEndMonth').value);
    const endYear = parseInt(document.getElementById('btEndYear').value);
    
    const initial = parseFloat(document.getElementById('btInitial').value) || 0;
    const monthly = parseFloat(document.getElementById('btMonthly').value) || 0;

    const series = getReturnSeries(asset);
    const baseAbs = series.startYear * 12 + series.startMonth;
    const startIndex = (startYear * 12 + startMonth) - baseAbs;
    const endIndex = (endYear * 12 + endMonth) - baseAbs;

    if (startIndex < 0 || endIndex > series.returns.length - 1) {
      toast('Periodo fuori dalla copertura dei dati disponibili per questo titolo', 'err');
      return;
    }
    if (startIndex >= endIndex) {
      toast('La data iniziale deve essere precedente a quella finale', 'err');
      return;
    }

    const allReturns = series.returns;
    
    let invested = initial;
    let portfolioValue = initial;
    
    const labels = [];
    const investedData = [];
    const portfolioData = [];
    
    investedData.push(invested);
    portfolioData.push(portfolioValue);
    
    const startD = new Date(startYear, startMonth, 15);
    labels.push(startD.toLocaleDateString('it-IT', { month: 'short', year: '2-digit' }));

    let maxPeak = portfolioValue;
    let maxDd = 0;

    for (let i = startIndex; i <= endIndex; i++) {
      const r = allReturns[i];
      portfolioValue = portfolioValue * (1 + r);
      portfolioValue += monthly;
      invested += monthly;

      if (portfolioValue > maxPeak) {
        maxPeak = portfolioValue;
      }
      const dd = maxPeak > 0 ? (maxPeak - portfolioValue) / maxPeak : 0;
      if (dd > maxDd) {
        maxDd = dd;
      }

      investedData.push(invested);
      portfolioData.push(portfolioValue);
      
      const absIdx = baseAbs + i;
      const d = new Date(Math.floor(absIdx / 12), absIdx % 12, 15);
      labels.push(d.toLocaleDateString('it-IT', { month: 'short', year: '2-digit' }));
    }

    document.getElementById('btResInvested').textContent = fmtEUR.format(invested);
    document.getElementById('btResFinal').textContent = fmtEUR.format(portfolioValue);
    
    const netGain = portfolioValue - invested;
    const totalReturnPct = invested > 0 ? (netGain / invested) * 100 : 0;
    const retLabel = document.getElementById('btResReturn');
    retLabel.textContent = `${netGain >= 0 ? '+' : ''}${totalReturnPct.toFixed(1)}% (${fmtEUR.format(netGain)})`;
    retLabel.className = `text-sm md:text-base font-bold mt-1 ${netGain >= 0 ? 'text-positive' : 'text-negative'}`;

    document.getElementById('btResDrawdown').textContent = `-${(maxDd * 100).toFixed(1)}%`;

    document.getElementById('btResultWrapper').classList.remove('hidden');

    destroyChart('backtest');

    const ctx = document.getElementById('chartBacktest').getContext('2d');
    const ctBt = chartTheme();
    charts['backtest'] = new Chart(ctx, {
      type: 'line',
      data: {
        labels,
        datasets: [
          {
            label: 'Valore storico',
            data: portfolioData,
            borderColor: ctBt.value,
            backgroundColor: ctBt.valueFill,
            borderWidth: 2,
            pointRadius: 0,
            fill: true,
            tension: 0.1
          },
          {
            label: 'Capitale versato',
            data: investedData,
            borderColor: ctBt.invested,
            borderDash: [5, 5],
            borderWidth: 1.5,
            pointRadius: 0,
            fill: false,
            tension: 0
          }
        ]
      },
      options: {
        responsive: true,
        maintainAspectRatio: false,
        plugins: {
          legend: {
            display: true,
            labels: { color: ctBt.legend, font: { size: 10 } }
          },
          tooltip: {
            mode: 'index',
            intersect: false,
            backgroundColor: ctBt.tooltipBg, borderColor: ctBt.tooltipBorder, borderWidth: 1, titleColor: ctBt.tooltipTitle, bodyColor: ctBt.tooltipBody,
            callbacks: {
              label: (ctx) => `${ctx.dataset.label}: ${fmtEUR.format(ctx.raw)}`
            }
          }
        },
        scales: {
          x: {
            grid: { display: false },
            ticks: { color: ctBt.tick, font: { size: 9 }, maxTicksLimit: 10 }
          },
          y: {
            grid: { color: ctBt.grid },
            ticks: { color: ctBt.tick, font: { size: 9 } }
          }
        }
      }
    });

    toast(series.real ? 'Simulazione completata su storico reale!' : 'Simulazione completata (percorso mensile sintetico)');
  }

  function runTaxOpt() {
    const goalId = document.getElementById('toGoal').value;
    const type = document.getElementById('toType').value;
    const inputVal = parseFloat(document.getElementById('toValue').value);

    if (isNaN(inputVal) || inputVal <= 0) {
      toast('Inserisci un valore valido maggiore di zero', 'err');
      return;
    }

    const goal = state.goals.find(g => g.id === goalId);
    if (!goal) return;

    const ticker = goal.assetTicker || 'VWCE.DE';
    const asset = state.settings.assets[ticker] || { price: 125.00 };
    const currentPrice = asset.price;

    const txs = [...state.transactions].filter(t => t.goalId === goalId).sort((a, b) => new Date(a.date) - new Date(b.date));
    const totalAvailableQuotas = txs.reduce((s, t) => s + t.quotas, 0);

    let Q_sell = 0;
    if (type === 'cash') {
      Q_sell = inputVal / currentPrice;
    } else {
      Q_sell = inputVal;
    }

    if (Q_sell > totalAvailableQuotas) {
      toast(`Possiedi solo ${fmtQuotas(totalAvailableQuotas)} quote per questo obiettivo. Impossibile simularne la vendita di ${fmtQuotas(Q_sell)}.`, 'err');
      return;
    }

    // Costo medio ponderato (PMC): costo totale di carico (commissioni incluse) / quote totali
    const totalHistoricCost = txs.reduce((s, t) => s + t.quotas * (t.price + (t.quotas > 0 ? t.fees / t.quotas : 0)), 0);
    const pmcUnit = totalAvailableQuotas > 0 ? totalHistoricCost / totalAvailableQuotas : 0;
    const historicCost = Q_sell * pmcUnit;

    const grossValue = Q_sell * currentPrice;
    const capitalGain = Math.max(0, grossValue - historicCost);
    const tax = capitalGain * getTaxRate();
    const netValue = grossValue - tax;

    document.getElementById('toResTicker').textContent = `${ticker} (${asset.name})`;
    document.getElementById('toResCurrentPrice').textContent = fmtEUR.format(currentPrice);
    document.getElementById('toResQuotas').textContent = fmtQuotas(Q_sell);
    document.getElementById('toResHistoricCost').textContent = fmtEUR.format(historicCost);
    
    document.getElementById('toResGross').textContent = fmtEUR.format(grossValue);
    document.getElementById('toResGain').textContent = fmtEUR.format(capitalGain);
    document.getElementById('toResTax').textContent = `-${fmtEUR.format(tax)}`;
    document.getElementById('toResNet').textContent = fmtEUR.format(netValue);

    document.getElementById('toResultWrapper').classList.remove('hidden');
    toast('Simulazione liquidazione (PMC) calcolata!');
  }

  function computeAssetRiskMetrics(ticker) {
    const series = getReturnSeries(ticker);
    const r = series.returns;
    const n = r.length;
    if (n === 0) return { sharpe: 0, sortino: 0, var95: 0, real: false, months: 0 };

    const rfMonthly = 0.02 / 12;

    let sum = 0;
    for (let i = 0; i < n; i++) sum += r[i];
    const mean = sum / n;

    let sumSq = 0;
    for (let i = 0; i < n; i++) {
      const diff = r[i] - mean;
      sumSq += diff * diff;
    }
    const stdDev = Math.sqrt(sumSq / (n - 1));

    let sumSqDown = 0;
    for (let i = 0; i < n; i++) {
      if (r[i] < rfMonthly) {
        const diff = r[i] - rfMonthly;
        sumSqDown += diff * diff;
      }
    }
    const downsideDev = Math.sqrt(sumSqDown / (n - 1));

    const sharpe = stdDev > 0 ? (Math.sqrt(12) * (mean - rfMonthly)) / stdDev : 0;
    const sortino = downsideDev > 0 ? (Math.sqrt(12) * (mean - rfMonthly)) / downsideDev : 0;

    const sorted = [...r].sort((a, b) => a - b);
    const var95 = percentileSorted(sorted, 5);

    return { sharpe, sortino, var95, real: series.real, months: n };
  }

  function renderRiskSubView(customWeights) {
    const container = document.getElementById('toolSubViewContent');
    if (!container) return;
    const assets = Object.values(state.settings.assets);

    const totalVal = state.goals.reduce((s, g) => s + computeGoalStats(g).currentValue, 0);
    const usingCustom = !!customWeights;
    const weights = {};
    if (usingCustom) {
      assets.forEach(a => {
        weights[a.ticker] = customWeights[a.ticker] || 0;
      });
    } else if (totalVal > 0) {
      assets.forEach(a => {
        weights[a.ticker] = getAssetCurrentValue(a.ticker) / totalVal;
      });
    } else {
      const sumT = assets.reduce((s, a) => s + (a.targetWeight || 0), 0);
      assets.forEach(a => {
        weights[a.ticker] = sumT > 0 ? (a.targetWeight || 0) / sumT : 1 / assets.length;
      });
    }

    const aggGeo = {};
    const aggSector = {};
    const portfolioCompanies = {};
    let hasAnyGeo = false;
    let hasAnySector = false;
    let hasAnyCompanies = false;

    assets.forEach(a => {
      const w = weights[a.ticker] || 0;
      if (w <= 0) return;

      const hasGeo = a.geographic && Object.keys(a.geographic).length > 0;
      if (hasGeo) {
        hasAnyGeo = true;
        Object.entries(a.geographic).forEach(([country, val]) => {
          aggGeo[country] = (aggGeo[country] || 0) + w * val;
        });
      } else {
        aggGeo['Non Specificato'] = (aggGeo['Non Specificato'] || 0) + w;
      }

      const hasSect = a.sector && Object.keys(a.sector).length > 0;
      if (hasSect) {
        hasAnySector = true;
        Object.entries(a.sector).forEach(([sect, val]) => {
          aggSector[sect] = (aggSector[sect] || 0) + w * val;
        });
      } else {
        aggSector['Non Specificato'] = (aggSector['Non Specificato'] || 0) + w;
      }

      if (a.holdings && a.holdings.length > 0) {
        hasAnyCompanies = true;
        a.holdings.forEach(h => {
          const key = h.name.trim();
          if (!portfolioCompanies[key]) {
            portfolioCompanies[key] = { name: h.name, weight: 0 };
          }
          portfolioCompanies[key].weight += w * h.weight;
        });
      }
    });

    // Ordinamento Geografia per grafico
    const sortedGeo = Object.entries(aggGeo).sort((a, b) => b[1] - a[1]);
    const chartGeoLabels = [];
    const chartGeoData = [];
    let otherGeoSum = 0;
    sortedGeo.forEach(([country, weight], idx) => {
      if (idx < 5) {
        chartGeoLabels.push(country);
        chartGeoData.push(weight * 100);
      } else {
        otherGeoSum += weight;
      }
    });
    if (otherGeoSum > 0) {
      chartGeoLabels.push('Altri');
      chartGeoData.push(otherGeoSum * 100);
    }
    const hasGeoData = chartGeoData.some(v => v > 0);

    // Ordinamento Settori per grafico
    const sortedSector = Object.entries(aggSector).sort((a, b) => b[1] - a[1]);
    const chartSectorLabels = [];
    const chartSectorData = [];
    let otherSectSum = 0;
    sortedSector.forEach(([sector, weight], idx) => {
      if (idx < 7) {
        chartSectorLabels.push(sector);
        chartSectorData.push(weight * 100);
      } else {
        otherSectSum += weight;
      }
    });
    if (otherSectSum > 0) {
      chartSectorLabels.push('Altri');
      chartSectorData.push(otherSectSum * 100);
    }
    const hasSectData = chartSectorData.some(v => v > 0);

    // Ordinamento Società per Concentrazione
    const sortedPortfolioCompanies = Object.values(portfolioCompanies).sort((a, b) => b.weight - a.weight);

    // Sovrapposizione tra coppie di ETF (somma dei pesi minimi per società comune)
    const overlapPairs = [];
    const etfsWithHoldings = assets.filter(a => (weights[a.ticker] || 0) > 0 && a.holdings && a.holdings.length > 0);
    for (let i = 0; i < etfsWithHoldings.length; i++) {
      for (let j = i + 1; j < etfsWithHoldings.length; j++) {
        const mapB = {};
        etfsWithHoldings[j].holdings.forEach(h => { mapB[h.name.toUpperCase().trim()] = h.weight; });
        let overlapSum = 0;
        etfsWithHoldings[i].holdings.forEach(h => {
          const wB = mapB[h.name.toUpperCase().trim()];
          if (wB) overlapSum += Math.min(h.weight, wB);
        });
        overlapPairs.push({ a: etfsWithHoldings[i].ticker, b: etfsWithHoldings[j].ticker, overlap: overlapSum });
      }
    }

    // Calcolo Allarmi di Sovraesposizione
    const alerts = [];

    renderAssetsTable();

      sumEl.textContent = `${(initialSum * 100).toFixed(0)}%`;

    }

    root.querySelectorAll('.correlation-input').forEach((input) => {
      input.addEventListener('change', (e) => {
