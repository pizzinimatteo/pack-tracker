        const t2 = e.target.dataset.t2;
        const val = parseFloat(e.target.value);
        if (isNaN(val) || val < -1.0 || val > 1.0) {
          toast('Valore non valido (-1.0 a 1.0)', 'err');
          e.target.value = getCorrelation(t1, t2).toFixed(2);
          return;
        }
        if (!state.settings.correlations) state.settings.correlations = {};
        const key = `${t1}_${t2}`;
        state.settings.correlations[key] = val;
        saveState();
        cachedCholesky = null; // Forza ricalcolo Cholesky
        toast(`Correlazione ${t1} ↔ ${t2} impostata a ${val.toFixed(2)}`);
      });
    });

    const stampInput = root.querySelector('#cfgStampDuty');

      taxInput.addEventListener('change', (e) => {
        const val = parseFloat(e.target.value);

          toast('Aliquota non valida (0-100%)', 'err');
          e.target.value = (getTaxRate() * 100).toFixed(0);
          return;
        }
        state.settings.taxRate = val / 100;
        saveState();
        toast(`Aliquota Capital Gain impostata al ${val}%`);
        renderAll();
      });
    }

    if (stampInput) {
      stampInput.addEventListener('change', (e) => {
        const val = parseFloat(e.target.value);
        if (isNaN(val) || val < 0 || val > 10) {
          toast('Imposta di bollo non valida (0-10%)', 'err');
          e.target.value = (getStampDutyRate() * 100).toFixed(2);
          return;
        }
        state.settings.stampDuty = val / 100;
        saveState();
        toast(`Imposta di bollo impostata al ${val}%`);
        renderAll();

    if (saleInput) {

          e.target.value = getSaleCostFlat().toFixed(2);
          return;

        saveState();

    root.querySelector('#exportBtn').addEventListener('click', exportData);

    root.querySelector('#importInput').addEventListener('change', importData);
    root.querySelector('#resetBtn').addEventListener('click', resetData);

    const syncConnectBtn = root.querySelector('#syncConnectBtn');

        syncConnectBtn.disabled = true;

          updateCloudHeaderBtn();
          renderSettings();
          if (info.foundExisting) checkCloudOnStartup();

          toast('Collegamento fallito: ' + err.message, 'err');
          syncConnectBtn.disabled = false;
          syncConnectBtn.textContent = 'Collega';
        }
      });
    }
    const syncSaveBtn = root.querySelector('#syncSaveBtn');
    if (syncSaveBtn) syncSaveBtn.addEventListener('click', () => cloudSave(false));
    const syncLoadBtn = root.querySelector('#syncLoadBtn');
    if (syncLoadBtn) syncLoadBtn.addEventListener('click', () => cloudLoad());
    const syncAutoToggle = root.querySelector('#syncAutoToggle');
    if (syncAutoToggle) {
      syncAutoToggle.addEventListener('change', (e) => {
        const cfg = getSyncConfig();
        cfg.auto = e.target.checked;
        saveSyncConfig(cfg);
        toast(cfg.auto ? 'Salvataggio automatico attivato' : 'Salvataggio automatico disattivato');
      });
    }
    const syncDisconnectBtn = root.querySelector('#syncDisconnectBtn');
    if (syncDisconnectBtn) {
      syncDisconnectBtn.addEventListener('click', () => {
        openConfirm('Scollegare la sincronizzazione?', 'Il token verrà rimosso da questo dispositivo. I dati locali e il backup sul cloud restano intatti.', () => {
          disconnectCloud();
          updateCloudHeaderBtn();
          renderSettings();
          toast('Sincronizzazione scollegata');
        }, true);
      });
    }
  }

  function renderCorrelationMatrixEditor() {
    const tickers = Object.keys(state.settings.assets);
    const n = tickers.length;
    if (n < 2) return ''; 
    
    let rowsHtml = '';
    for (let i = 0; i < n; i++) {
      for (let j = i + 1; j < n; j++) {
        const t1 = tickers[i];
        const t2 = tickers[j];
        const val = getCorrelation(t1, t2);
        
        rowsHtml += `
          <div class="flex items-center justify-between bg-base-900/40 border border-base-800 rounded-xl p-3">
            <div>
              <p class="font-bold text-xs text-slate-200">${escapeHtml(t1)} <span class="text-slate-500 font-normal">↔</span> ${escapeHtml(t2)}</p>
              <p class="text-[10px] text-slate-500">Correlazione stocastica Monte Carlo</p>
            </div>
            <div class="flex items-center gap-1.5">
              <input type="number" step="0.05" min="-1.0" max="1.0" value="${val.toFixed(2)}" data-t1="${t1}" data-t2="${t2}" class="correlation-input w-16 bg-base-850 border border-base-700 text-xs text-slate-200 text-right rounded px-1.5 py-1 focus:outline-none focus:ring-1 focus:ring-accent">
            </div>
          </div>
        `;
      }
    }

    return `
      <div class="lg:col-span-2 card rounded-2xl p-5 md:p-6 space-y-4">
        <div>
          <h3 class="font-bold text-white mb-1">Matrice delle Correlazioni Storiche</h3>
          <p class="text-xs text-slate-400">Personalizza i coefficienti di correlazione lineare (range da -1.0 a 1.0) per le simulazioni Monte Carlo multi-asset. Valori alti allineano le fluttuazioni, valori bassi o negativi diversificano il portafoglio stocastico.</p>
        </div>
        <div class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 gap-3">
          ${rowsHtml}
        </div>
      </div>
    `;
  }

  function exportData() {
    const blob = new Blob([JSON.stringify(state, null, 2)], { type: 'application/json' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    const stamp = new Date().toISOString().slice(0, 10);
    a.href = url;
    a.download = `pac-vwce-backup-${stamp}.json`;
    document.body.appendChild(a);
    a.click();
    a.remove();
    URL.revokeObjectURL(url);
    toast('Backup esportato');
  }

  function exportTransactionsCsv() {
    if (state.transactions.length === 0) {
      toast('Nessuna transazione registrata da esportare', 'err');
      return;
    }

    const headers = ['ID', 'Data', 'Obiettivo', 'Tipo', 'Importo Lordo (€)', 'Commissioni (€)', 'Prezzo (€)', 'Quote Acquisite', 'Ticker Asset'];
    const rows = state.transactions.map(t => {
      const goal = state.goals.find(g => g.id === t.goalId);
      const goalName = goal ? goal.name : 'N/A';
      return [
        t.id,
        t.date,
        `"${goalName.replace(/"/g, '""')}"`,
        t.type,
        t.grossAmount.toFixed(2),
        t.fees.toFixed(2),
        t.price.toFixed(4),
        t.quotas.toFixed(6),
        t.assetTicker || 'VWCE.DE'
      ].join(';');
    });

    const csvContent = '\uFEFF' + [headers.join(';'), ...rows].join('\r\n');
    const blob = new Blob([csvContent], { type: 'text/csv;charset=utf-8;' });
    const link = document.createElement('a');
    link.href = URL.createObjectURL(blob);
    link.setAttribute('download', 'pac-transazioni-backup.csv');
    document.body.appendChild(link);
    link.click();
    document.body.removeChild(link);
    toast('Transazioni esportate in CSV!');
  }

  function importData(e) {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = () => {
      try {
        const parsed = JSON.parse(reader.result);
        if (!parsed || typeof parsed !== 'object') throw new Error('formato non valido');
        openConfirm('Importare backup?', 'Questo sovrascriverà tutti i dati attuali con quelli del file importato. Continuare?', () => {
          const importedGoals = (Array.isArray(parsed.goals) ? parsed.goals : []).map((g) => ({
            id: g.id || uid(),
            name: String(g.name || 'Obiettivo').trim(),
            targetAmount: Math.max(0.01, parseFloat(g.targetAmount) || 1000),
            monthlyContribution: Math.max(0, parseFloat(g.monthlyContribution) || 0),
            startDate: g.startDate || new Date().toISOString().slice(0, 10),
            color: g.color || GOAL_COLORS[0],
            assetTicker: g.assetTicker || 'VWCE.DE',
          }));
          const importedTx = (Array.isArray(parsed.transactions) ? parsed.transactions : []).map((t) => ({
            id: t.id || uid(),
            goalId: t.goalId,
            date: t.date || new Date().toISOString().slice(0, 10),
            type: t.type || 'PAC',
            grossAmount: Math.max(0.01, parseFloat(t.grossAmount != null ? t.grossAmount : t.amount) || 0.01),
            fees: Math.max(0, parseFloat(t.fees) || 0),
            price: Math.max(0.0001, parseFloat(t.price) || 100),
            quotas: Math.max(0, parseFloat(t.quotas) || 0),
            assetTicker: t.assetTicker || gTickerForId(t.goalId, importedGoals),
          }));
          const importedAssets = sanitizeAssets(parsed.settings && parsed.settings.assets ? parsed.settings.assets : null);
          state = Object.assign(defaultState(), parsed, {
            settings: Object.assign(defaultState().settings, parsed.settings || {}, { assets: importedAssets }),
            goals: importedGoals,
            transactions: importedTx,
          });
          saveState();
          toast('Dati importati correttamente');
          renderAll();
        });
      } catch (err) {
        toast('File non valido', 'err');
      } finally {
        e.target.value = '';
      }
    };
    reader.readAsText(file);
  }

  function resetData() {
    openConfirm('Reset completo', 'Tutti gli obiettivi e le transazioni verranno eliminati definitivamente da questo dispositivo. Questa azione non è reversibile. Continuare?', () => {
      state = defaultState();
      saveState();
      toast('Dati azzerati');
      renderAll();
    }, true);
  }

  async function fetchLiveAssetPrice(ticker) {
    const targetUrl = `https://query1.finance.yahoo.com/v8/finance/chart/${ticker}`;
    const proxies = [
      `https://corsproxy.io/?url=${encodeURIComponent(targetUrl)}`,
      `https://api.allorigins.win/get?url=${encodeURIComponent(targetUrl)}`
    ];

    for (const url of proxies) {
      try {
        const response = await fetch(url);
        if (!response.ok) continue;
        const data = await response.json();
        
        let resultJson;
        if (data && data.contents) {
          resultJson = JSON.parse(data.contents);
        } else {
          resultJson = data;
        }

        const price = resultJson.chart.result[0].meta.regularMarketPrice;
        if (typeof price === 'number' && price > 0) {
          return price;
        }
      } catch (err) {
        console.warn(`Failed fetching price for ${ticker} from proxy: ${url}`, err);
      }
    }
    throw new Error(`Impossibile recuperare il prezzo attuale di ${ticker}.`);
  }

  let isUpdatingPrice = false;
  async function updatePricesOnline(silent = false) {
    if (isUpdatingPrice) return;
    isUpdatingPrice = true;

    const btn = document.getElementById('refreshPriceBtn');
    if (btn) btn.classList.add('animate-spin', 'text-accent');
    
    const settingsBtn = document.getElementById('settingsRefreshAllBtn');
    if (settingsBtn) {
      settingsBtn.classList.add('animate-spin', 'text-accent');
    }

    try {
      if (!navigator.onLine && !silent) {
        throw new Error("Dispositivo offline. Controlla la connessione internet.");
      }

      const tickers = Object.keys(state.settings.assets);
      let successCount = 0;
      for (const ticker of tickers) {
        try {
          const price = await fetchLiveAssetPrice(ticker);
          state.settings.assets[ticker].price = price;
          successCount++;
        } catch (err) {
          console.warn(`Failed fetching price for ${ticker}`, err);
        }
      }

      state.settings.lastPriceUpdate = new Date().toISOString();
      saveState();
      renderAll();

      if (!silent) {
        toast(`Aggiornati ${successCount} titoli su ${tickers.length} online.`);
      }
    } catch (err) {
      console.error(err);
      if (!silent) {
        toast(err.message || "Errore durante l'aggiornamento online.", "err");
      }
    } finally {
      isUpdatingPrice = false;
      if (btn) btn.classList.remove('animate-spin', 'text-accent');
      if (settingsBtn) {
        settingsBtn.classList.remove('animate-spin', 'text-accent');
      }
    }
  }

  function checkTemporalAutomation() {
    const now = new Date();
    const day = now.getDate();
    
    const year = now.getFullYear();
    const month = String(now.getMonth() + 1).padStart(2, '0');
    const currentMonthString = `${year}-${month}`;

    if (!state.settings.lastAutoCheck) {
      state.settings.lastAutoCheck = currentMonthString;
      saveState();
      return;
    }

    const parts = state.settings.lastAutoCheck.split('-');
    let checkYear = parseInt(parts[0]);
    let checkMonth = parseInt(parts[1]);

    const targetYear = year;
    const targetMonth = now.getMonth() + 1;

    const monthsToProcess = [];

    while (true) {
      checkMonth++;
      if (checkMonth > 12) {
        checkMonth = 1;
        checkYear++;
      }

      if (checkYear > targetYear || (checkYear === targetYear && checkMonth > targetMonth)) {
        break;
      }
      
      if (checkYear === targetYear && checkMonth === targetMonth && day < 15) {
        break;
      }

      monthsToProcess.push(`${checkYear}-${String(checkMonth).padStart(2, '0')}`);
    }

    if (monthsToProcess.length === 0) return;

    const pending = [];
    monthsToProcess.forEach((mStr) => {
      state.goals.forEach((goal) => {
        if (goal.monthlyContribution <= 0) return;

        const hasPacThisMonth = state.transactions.some((t) =>
          t.goalId === goal.id &&
          t.type === 'PAC' &&
          t.date.startsWith(mStr)
        );

        if (!hasPacThisMonth) {
          pending.push({ mStr, goal });
        }
      });
    });

    // Nessun versamento mancante da creare: avanza il checkpoint senza chiedere conferma.
    if (pending.length === 0) {
      state.settings.lastAutoCheck = monthsToProcess[monthsToProcess.length - 1];
      saveState();
      return;
    }

    // Non essendo disponibile lo storico prezzi per i mesi saltati, i versamenti retroattivi
    // verrebbero valorizzati al prezzo ATTUALE (un'approssimazione). Chiediamo conferma esplicita
    // invece di alterare in silenzio PMC, plusvalenze e XIRR storici dell'utente.
    const monthsLabel = monthsToProcess.map((m) => fmtMonthYear(m + '-15')).join(', ');
    openConfirm(
      'Versamenti PAC mancanti rilevati',
      `Non risultano versamenti PAC per ${monthsToProcess.length === 1 ? 'il mese' : 'i mesi'} ${monthsLabel}. Vuoi registrare automaticamente ${pending.length} versamento/i mancante/i? Verranno valorizzati al prezzo ATTUALE del titolo (non è disponibile lo storico del prezzo per quei mesi): controlla e correggi manualmente prezzo/quote nella sezione Transazioni se vuoi un valore più preciso.`,
      () => {
        let addedCount = 0;

  function readTabularFile(file, callback) {
    const isExcel = file.name.endsWith('.xlsx') || file.name.endsWith('.xls');
    const reader = new FileReader();
    reader.onload = (event) => {
      try {
        let text = '';
        if (isExcel) {
          const data = new Uint8Array(event.target.result);
          const workbook = XLSX.read(data, { type: 'array' });
          const sheetName = workbook.SheetNames[0];
          const worksheet = workbook.Sheets[sheetName];
          text = XLSX.utils.sheet_to_csv(worksheet);
        } else {
          text = event.target.result;
        }
        callback(text);
      } catch (err) {
        console.error(err);
        toast('Errore durante la lettura del file', 'err');
      }
    };
    if (isExcel) {
      reader.readAsArrayBuffer(file);
    } else {
      reader.readAsText(file);
    }
  }

  function processAssetCompositionFile(file, callback) {
    readTabularFile(file, (text) => {
      const parsed = parseCSVHoldings(text);
      if (parsed) {
        callback(parsed);
      } else {
        toast('Struttura file non riconosciuta o vuota', 'err');
      }
    });
  }

  /* ---------------------------------- Parser Storico Prezzi (NAV) ---------------------------------- */

  function parseFlexNumber(s) {
    if (s == null) return NaN;
    let t = String(s).replace(/["'\s€$£]/g, '');
    if (!t) return NaN;
    const hasComma = t.includes(',');
    const hasDot = t.includes('.');
    if (hasComma && hasDot) {
      // L'ultimo separatore che compare è quello decimale
      if (t.lastIndexOf(',') > t.lastIndexOf('.')) t = t.replace(/\./g, '').replace(',', '.');
      else t = t.replace(/,/g, '');
    } else if (hasComma) {
      const pieces = t.split(',');
      if (pieces.length === 2 && pieces[1].length === 3 && pieces[0].length > 3) t = t.replace(/,/g, '');
      else if (pieces.length === 2) t = t.replace(',', '.');
      else t = t.replace(/,/g, '');
    }
    const v = parseFloat(t);
    return isFinite(v) ? v : NaN;
  }

  const MONTH_NAMES = { gen: 1, feb: 2, mar: 3, apr: 4, mag: 5, giu: 6, lug: 7, ago: 8, set: 9, ott: 10, nov: 11, dic: 12, jan: 1, may: 5, jun: 6, jul: 7, aug: 8, sep: 9, oct: 10, dec: 12 };

  function parseDateFlexible(s) {
    const t = String(s).replace(/"/g, '').trim();
    let m = t.match(/^(\d{4})[-\/\.](\d{1,2})[-\/\.](\d{1,2})/);
    if (m) return { y: +m[1], mo: +m[2], d: +m[3], ambiguous: false };
    m = t.match(/^(\d{1,2})[-\/\.](\d{1,2})[-\/\.](\d{2,4})$/);
    if (m) {
      let y = +m[3];
      if (y < 100) y += (y < 70 ? 2000 : 1900);
      return { y, a: +m[1], b: +m[2], ambiguous: true };
    }
    m = t.match(/^(\d{1,2})\s+([A-Za-zàé]{3,})\.?\s+(\d{4})/);
    if (m) {
      const mo = MONTH_NAMES[m[2].slice(0, 3).toLowerCase()];
      if (mo) return { y: +m[3], mo, d: +m[1], ambiguous: false };
    }
    m = t.match(/^([A-Za-z]{3,})\.?\s+(\d{1,2}),?\s+(\d{4})/);
    if (m) {
      const mo = MONTH_NAMES[m[1].slice(0, 3).toLowerCase()];
      if (mo) return { y: +m[3], mo, d: +m[2], ambiguous: false };
    }
    return null;
  }

  function parsePriceHistory(text) {
    const lines = text.split(/\r?\n/).map(l => l.trim()).filter(l => l);
    if (lines.length < 13) return null;

    // Separatore: colonne consistenti (>=2) sul maggior numero di righe; a parità vince ';'
    let sep = null;
    let bestScore = 0;
    [';', '\t', ','].forEach(s => {
      const counts = lines.slice(0, Math.min(lines.length, 40)).map(l => l.split(s).length);
      const modal = counts.sort((a, b) =>
        counts.filter(v => v === a).length - counts.filter(v => v === b).length
      ).pop();
      if (modal < 2) return;
      const consistency = counts.filter(c => c === modal).length / counts.length;
      const score = consistency * 10 + modal;
      if (score > bestScore) { bestScore = score; sep = s; }
    });
    if (!sep) return null;

    const splitLine = (line) => {
      if (sep === ',') return line.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/);
      if (sep === ';') return line.split(/;(?=(?:(?:[^"]*"){2})*[^"]*$)/);
      return line.split(sep);
    };

    // Individua colonna data e colonna prezzo dall'intestazione...
    const headers = splitLine(lines[0]).map(p => p.replace(/"/g, '').trim().toLowerCase());
    let colDate = headers.findIndex(h => h.includes('date') || h.includes('data') || h === 'giorno');
    let colPrice = headers.findIndex(h => h.includes('adj'));
    if (colPrice === -1) {
      colPrice = headers.findIndex(h => h.includes('nav') || h.includes('price') || h.includes('prezzo') || h.includes('close') || h.includes('chiusura') || h.includes('ultimo') || h.includes('quotazi') || (h.includes('valore') && !h.includes('data')));
    }
    let startRow = 1;

    // ...oppure, se l'intestazione non è riconoscibile, dal contenuto delle prime righe
    if (colDate === -1 || colPrice === -1) {
      const sample = lines.slice(0, Math.min(lines.length, 15)).map(splitLine);
      const nCols = Math.max(...sample.map(r => r.length));
      let bestDate = -1, bestDateHits = 0;
      for (let c = 0; c < nCols; c++) {
        const hits = sample.filter(r => r[c] && parseDateFlexible(r[c])).length;
        if (hits > bestDateHits) { bestDateHits = hits; bestDate = c; }
      }
      if (bestDate === -1) return null;
      colDate = bestDate;
      let bestPrice = -1, bestPriceHits = 0;
      for (let c = 0; c < nCols; c++) {
        if (c === colDate) continue;
        const hits = sample.filter(r => r[c] && !isNaN(parseFlexNumber(r[c])) && parseFlexNumber(r[c]) > 0).length;
        if (hits > bestPriceHits) { bestPriceHits = hits; bestPrice = c; }
      }
      if (bestPrice === -1) return null;
      colPrice = bestPrice;
      startRow = parseDateFlexible(splitLine(lines[0])[colDate]) ? 0 : 1;
    }

    // Prima passata: risolvi l'ambiguità giorno/mese (formati tipo 03/04/2020)
    let dayFirst = null;
    for (let i = startRow; i < lines.length; i++) {
      const parts = splitLine(lines[i]);
      if (parts.length <= Math.max(colDate, colPrice)) continue;
      const d = parseDateFlexible(parts[colDate]);
      if (d && d.ambiguous) {
        if (d.a > 12) { dayFirst = true; break; }
        if (d.b > 12) { dayFirst = false; break; }
      }
    }
    if (dayFirst === null) dayFirst = true; // default europeo

    // Seconda passata: ultimo prezzo disponibile di ogni mese
    const monthMap = {};
    for (let i = startRow; i < lines.length; i++) {
      const parts = splitLine(lines[i]);
      if (parts.length <= Math.max(colDate, colPrice)) continue;
      const dRaw = parseDateFlexible(parts[colDate]);
      if (!dRaw) continue;
      const price = parseFlexNumber(parts[colPrice]);
      if (isNaN(price) || price <= 0) continue;
      let y, mo, day;
      if (dRaw.ambiguous) {
        y = dRaw.y;
        mo = dayFirst ? dRaw.b : dRaw.a;
        day = dayFirst ? dRaw.a : dRaw.b;
      } else {
        y = dRaw.y; mo = dRaw.mo; day = dRaw.d;
      }
      if (mo < 1 || mo > 12 || day < 1 || day > 31 || y < 1980 || y > 2100) continue;
      const key = y * 12 + (mo - 1);
      if (!monthMap[key] || day >= monthMap[key].day) {
        monthMap[key] = { day, price };
      }
    }

    const keys = Object.keys(monthMap).map(Number).sort((a, b) => a - b);
    if (keys.length < 13) return null;

    // Sequenza mensile continua dal primo all'ultimo mese (carry-forward sui buchi)
    const prices = [];
    let lastPrice = null;
    for (let k = keys[0]; k <= keys[keys.length - 1]; k++) {
      if (monthMap[k]) lastPrice = monthMap[k].price;
      prices.push(lastPrice);
    }

    const returns = [];
    for (let i = 1; i < prices.length; i++) {
      const r = prices[i] / prices[i - 1] - 1;
      if (!isFinite(r) || Math.abs(r) > 0.9) return null; // probabile errore di formato
      returns.push(r);
    }
    if (returns.length < 12) return null;

    const startKey = keys[0] + 1; // il primo rendimento è quello del mese successivo al primo prezzo
    const fmtKey = (k) => `${Math.floor(k / 12)}-${String((k % 12) + 1).padStart(2, '0')}`;
    return {
      start: fmtKey(startKey),
      returns,
      months: returns.length,
      firstMonth: fmtKey(startKey),
      lastMonth: fmtKey(keys[keys.length - 1])
    };
  }

  function parseCSVHoldings(text) {
    const lines = text.split(/\r?\n/);
    if (lines.length < 2) return null;

    let sep = ',';
    let headerIndex = -1;
    let headers = [];

    for (let i = 0; i < Math.min(lines.length, 100); i++) {
      const line = lines[i];
      let parts = line.split(',');
      if (parts.length > 2 && parts.some(p => {
        const low = p.toLowerCase();
        return low.includes('weight') || low.includes('peso') || low.includes('percent') || low.includes('holding') || low.includes('ticker') || low.includes('isin');
      })) {
        sep = ',';
        headerIndex = i;
        headers = parts.map(p => p.replace(/"/g, '').trim().toLowerCase());
        break;
      }
      parts = line.split(';');
      if (parts.length > 2 && parts.some(p => {
        const low = p.toLowerCase();
        return low.includes('weight') || low.includes('peso') || low.includes('percent') || low.includes('holding') || low.includes('ticker') || low.includes('isin');
      })) {
        sep = ';';
        headerIndex = i;
        headers = parts.map(p => p.replace(/"/g, '').trim().toLowerCase());
        break;
      }
      parts = line.split('\t');
      if (parts.length > 2 && parts.some(p => {
        const low = p.toLowerCase();
        return low.includes('weight') || low.includes('peso') || low.includes('percent') || low.includes('holding') || low.includes('ticker') || low.includes('isin');
      })) {
        sep = '\t';
        headerIndex = i;
        headers = parts.map(p => p.replace(/"/g, '').trim().toLowerCase());
        break;
      }
    }

    if (headerIndex === -1) {
      for (let i = 0; i < lines.length; i++) {
        if (lines[i].split(',').length > 2) {
          headerIndex = i;
          sep = ',';
          headers = lines[i].split(',').map(p => p.replace(/"/g, '').trim().toLowerCase());
          break;
        }
        if (lines[i].split(';').length > 2) {
          headerIndex = i;
          sep = ';';
          headers = lines[i].split(';').map(p => p.replace(/"/g, '').trim().toLowerCase());
          break;
        }
      }
    }

    if (headerIndex === -1) return null;

    let colName = -1;
    let colWeight = -1;
    let colSector = -1;
    let colGeo = -1;

    for (let i = 0; i < headers.length; i++) {
      const h = headers[i];
      if (h.includes('name') || h.includes('nome') || h.includes('holding') || h.includes('titolo') || h.includes('description') || h.includes('descrizione')) {
        if (colName === -1 || h === 'name' || h === 'nome') colName = i;
      }
      if (h.includes('weight') || h.includes('peso') || h.includes('percent') || h.includes('quota') || h.includes('%') || h.includes('pct') || h.includes('pondera')) {
        colWeight = i;
      }
      if (h.includes('sector') || h.includes('settore') || h.includes('industry')) {
        colSector = i;
      }
      if (h.includes('country') || h.includes('paese') || h.includes('location') || h.includes('nazione') || h.includes('region') || h.includes('area') || h.includes('geography')) {
        colGeo = i;
      }
    }

    // Ensure colName and colWeight are not the same column
    if (colWeight === colName && colWeight !== -1) {
      colWeight = -1;
    }

    if (colName === -1) {
      for (let i = 0; i < headers.length; i++) {
        const h = headers[i];
        if (h.includes('name') || h.includes('nome') || h.includes('holding') || h.includes('titolo') || h.includes('description') || h.includes('descrizione')) {
          colName = i;
          break;
        }
      }
    }
    if (colWeight === -1) {
      for (let i = 0; i < headers.length; i++) {
        if (i === colName) continue;
        const h = headers[i];
        if (h.includes('weight') || h.includes('peso') || h.includes('percent') || h.includes('quota') || h.includes('%') || h.includes('pct') || h.includes('pondera')) {
          colWeight = i;
          break;
        }
      }
    }

    if (colName === -1) colName = 0;
    if (colWeight === -1) {
      colWeight = colName === 0 ? 1 : 0;
    }

    const holdings = [];
    for (let i = headerIndex + 1; i < lines.length; i++) {
      const line = lines[i].trim();
      if (!line) continue;

      let parts = [];
      if (sep === ',') {
        parts = line.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/);
      } else if (sep === ';') {
        parts = line.split(/;(?=(?:(?:[^"]*"){2})*[^"]*$)/);
      } else {
        parts = line.split(sep);
      }

      if (parts.length <= Math.max(colName, colWeight)) continue;

      let nameVal = parts[colName].replace(/"/g, '').trim();
      let weightRaw = parts[colWeight].replace(/"/g, '').trim();

      if (!nameVal || !weightRaw) continue;

      weightRaw = weightRaw.replace('%', '').replace(',', '.').trim();
      let weightVal = parseFloat(weightRaw);
      if (isNaN(weightVal) || weightVal <= 0) continue;

      let sectorVal = colSector !== -1 && parts[colSector] ? parts[colSector].replace(/"/g, '').trim() : 'Altro';
      let geoVal = colGeo !== -1 && parts[colGeo] ? parts[colGeo].replace(/"/g, '').trim() : 'Altro';

      holdings.push({ name: nameVal, weight: weightVal, sector: sectorVal, geo: geoVal });
    }

    if (holdings.length === 0) return null;

    const sumWeights = holdings.reduce((s, h) => s + h.weight, 0);
    const needsScale = sumWeights > 1.5;
    
    const finalHoldings = [];
    const finalGeo = {};
    const finalSector = {};

    holdings.forEach(h => {
      const finalW = needsScale ? h.weight / 100 : h.weight;
      finalHoldings.push({ name: h.name, weight: finalW });

      let g = h.geo || 'Altro';
      const gClean = g.trim().toUpperCase();
      const gLow = g.toLowerCase();

      if (gClean === 'US' || gClean === 'USA' || gLow === 'united states' || gLow === 'stati uniti') g = 'Stati Uniti';
      else if (gClean === 'JP' || gLow === 'japan' || gLow === 'giappone') g = 'Giappone';
      else if (gClean === 'GB' || gClean === 'UK' || gLow === 'united kingdom' || gLow === 'regno unito') g = 'Regno Unito';
      else if (gClean === 'DE' || gLow === 'germany' || gLow === 'germania') g = 'Germania';
      else if (gClean === 'FR' || gLow === 'france' || gLow === 'francia') g = 'Francia';
      else if (gClean === 'CN' || gLow === 'china' || gLow === 'cina') g = 'Cina';
      else if (gClean === 'IN' || gLow === 'india') g = 'India';
      else if (gClean === 'TW' || gLow === 'taiwan') g = 'Taiwan';
      else if (gClean === 'CA' || gLow === 'canada') g = 'Canada';
      else if (gClean === 'KR' || gLow === 'korea' || gLow === 'corea' || gLow === 'south korea' || gLow === 'corea del sud') g = 'Corea del Sud';
      else if (gClean === 'AU' || gLow === 'australia') g = 'Australia';
      else if (gClean === 'CH' || gLow === 'switzerland' || gLow === 'svizzera') g = 'Svizzera';
      else if (gClean === 'IT' || gLow === 'italy' || gLow === 'italia') g = 'Italia';
      else if (gClean === 'NL' || gLow === 'netherlands' || gLow === 'paesi bassi') g = 'Paesi Bassi';
      else if (gClean === 'BR' || gLow === 'brazil' || gLow === 'brasile') g = 'Brasile';
      else if (gClean === 'MX' || gLow === 'mexico' || gLow === 'messico') g = 'Messico';
      else if (gClean === 'ZA' || gLow === 'south africa' || gLow === 'sudafrica') g = 'Sudafrica';
      else if (gClean === 'ES' || gLow === 'spain' || gLow === 'spagna') g = 'Spagna';
      else if (gClean === 'SE' || gLow === 'sweden' || gLow === 'svezia') g = 'Svezia';
      else if (gClean === 'DK' || gLow === 'denmark' || gLow === 'danimarca') g = 'Danimarca';
      else if (gClean === 'FI' || gLow === 'finland' || gLow === 'finlandia') g = 'Finlandia';
      else if (gClean === 'BE' || gLow === 'belgium' || gLow === 'belgio') g = 'Belgio';
      else if (gClean === 'NO' || gLow === 'norway' || gLow === 'norvegia') g = 'Norvegia';
      else if (gClean === 'IE' || gLow === 'ireland' || gLow === 'irlanda') g = 'Irlanda';
      else if (gClean === 'SG' || gLow === 'singapore') g = 'Singapore';
      else if (gClean === 'HK' || gLow === 'hong kong') g = 'Hong Kong';
      else if (gClean === 'HU' || gLow === 'hungary' || gLow === 'ungheria') g = 'Ungheria';
      else {
        g = g.trim();
        if (g) {
          g = g.charAt(0).toUpperCase() + g.slice(1);
        } else {
          g = 'Altro';
        }
      }
      finalGeo[g] = (finalGeo[g] || 0) + finalW;

      let s = h.sector || 'Altro';
      if (['technology', 'tecnologia', 'software', 'semiconductors'].some(x => s.toLowerCase().includes(x))) s = 'Tecnologia';
      else if (['financial', 'finanza', 'finanziari', 'banks', 'banche', 'insurance'].some(x => s.toLowerCase().includes(x))) s = 'Finanza';
      else if (['health', 'salute', 'healthcare', 'pharma', 'farmaceutico'].some(x => s.toLowerCase().includes(x))) s = 'Salute';
      else if (['consumer cyclical', 'consumi ciclici', 'automotive', 'retail'].some(x => s.toLowerCase().includes(x))) s = 'Beni Voluttuari';
      else if (['consumer defensive', 'consumi difensivi', 'food', 'supermarkets'].some(x => s.toLowerCase().includes(x))) s = 'Beni di Consumo';
      else if (['communication', 'comunicazioni', 'telecom'].some(x => s.toLowerCase().includes(x))) s = 'Telecomunicazioni';
      else if (['industrials', 'industria', 'aerospace', 'machinery'].some(x => s.toLowerCase().includes(x))) s = 'Industria';
      else if (['energy', 'energia', 'oil', 'gas'].some(x => s.toLowerCase().includes(x))) s = 'Energia';
      else if (['utilities', 'servizi pubblici', 'water', 'electricity'].some(x => s.toLowerCase().includes(x))) s = 'Utility';
      else if (['real estate', 'immobiliare'].some(x => s.toLowerCase().includes(x))) s = 'Immobiliare';
      else if (['basic materials', 'materiali di base', 'chemicals', 'chimica', 'mining'].some(x => s.toLowerCase().includes(x))) s = 'Materiali di Base';
      s = s.charAt(0).toUpperCase() + s.slice(1);
      finalSector[s] = (finalSector[s] || 0) + finalW;
    });

    finalHoldings.sort((a, b) => b.weight - a.weight);

    return {
      holdings: finalHoldings,
      geographic: finalGeo,
      sector: finalSector
    };
  }

  function openAssetModal(ticker) {
    const editing = !!ticker;
    const asset = editing ? state.settings.assets[ticker] : null;
    let tempCSVData = null;
    const initialHoldingsCount = editing && asset.holdings ? asset.holdings.length : 0;

    const html = `
      <div class="fixed inset-0 bg-black/70 z-[60] flex items-end sm:items-center justify-center p-0 sm:p-4" id="modalBackdrop">
        <div class="card w-full sm:max-w-md sm:rounded-2xl rounded-t-2xl p-5 md:p-6 max-h-[92vh] overflow-y-auto fade-in">
          <div class="flex items-center justify-between mb-4">
            <h3 class="font-bold text-white text-lg">${editing ? 'Modifica Titolo' : 'Aggiungi Titolo'}</h3>
            <button id="closeModal" class="text-slate-400 hover:text-white p-1"><svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12"/></svg></button>
          </div>
          <form id="assetForm" class="space-y-4">
            <div>
              <label class="text-xs text-slate-400 mb-1 block">Ticker (compatibile Yahoo Finance, es. QDVE.DE)</label>
              <input name="ticker" required maxlength="15" ${editing ? 'readonly class="w-full bg-base-900 border border-base-800 text-sm text-slate-400 rounded-xl px-3 py-2.5 cursor-not-allowed"' : 'class="w-full bg-base-800 border border-base-700 text-sm text-slate-100 rounded-xl px-3 py-2.5 focus:outline-none focus:ring-2 focus:ring-accent/50"'} value="${editing ? escapeHtml(asset.ticker) : ''}" placeholder="QDVE.DE">
            </div>
            <div>
              <label class="text-xs text-slate-400 mb-1 block">Nome Strumento</label>
              <input name="name" required maxlength="50" value="${editing ? escapeHtml(asset.name) : ''}" placeholder="Es. iShares S&P 500 Info Tech" class="w-full bg-base-800 border border-base-700 text-sm text-slate-100 rounded-xl px-3 py-2.5 focus:outline-none focus:ring-2 focus:ring-accent/50">
            </div>
            <div class="grid grid-cols-2 gap-3">
              <div>
                <label class="text-xs text-slate-400 mb-1 block">Codice ISIN</label>
                <input name="isin" required maxlength="12" value="${editing ? escapeHtml(asset.isin) : ''}" placeholder="IE00B3WJKG14" class="w-full bg-base-800 border border-base-700 text-sm text-slate-100 rounded-xl px-3 py-2.5 focus:outline-none focus:ring-2 focus:ring-accent/50">
              </div>
              <div>
                <label class="text-xs text-slate-400 mb-1 block">Prezzo attuale (€)</label>
                <input name="price" type="number" step="0.0001" min="0.0001" required value="${editing ? asset.price : ''}" placeholder="24.50" class="w-full bg-base-800 border border-base-700 text-sm text-slate-100 rounded-xl px-3 py-2.5 focus:outline-none focus:ring-2 focus:ring-accent/50">
              </div>
            </div>
            <div class="grid grid-cols-2 gap-3">
              <div>
                <label class="text-xs text-slate-400 mb-1 block">Rendimento nominale atteso (%/anno)</label>
                <input name="meanReturn" type="number" step="0.1" required value="${editing ? (asset.meanReturn * 100).toFixed(1) : '7.0'}" class="w-full bg-base-800 border border-base-700 text-sm text-slate-100 rounded-xl px-3 py-2.5 focus:outline-none focus:ring-2 focus:ring-accent/50">
              </div>
              <div>
                <label class="text-xs text-slate-400 mb-1 block">Volatilità attesa (%/anno)</label>
                <input name="volatility" type="number" step="0.5" required value="${editing ? (asset.volatility * 100).toFixed(1) : '12.0'}" class="w-full bg-base-800 border border-base-700 text-sm text-slate-100 rounded-xl px-3 py-2.5 focus:outline-none focus:ring-2 focus:ring-accent/50">
              </div>
            </div>
            <div>
              <label class="text-xs text-slate-400 mb-1 block">Peso Target in portafoglio (%)</label>
              <input name="targetWeight" type="number" step="1" min="0" max="100" required value="${editing ? ((asset.targetWeight || 0) * 100).toFixed(0) : '0'}" class="w-full bg-base-800 border border-base-700 text-sm text-slate-100 rounded-xl px-3 py-2.5 focus:outline-none focus:ring-2 focus:ring-accent/50">
            </div>
            
            <div class="border-t border-base-800 pt-3 space-y-2">
              <label class="text-xs text-slate-400 block font-semibold">Composizione ETF (Società & Macro) da CSV/Excel</label>
              <div id="csvDropZone" class="border-2 border-dashed border-base-700 hover:border-accent/50 rounded-xl p-4 text-center cursor-pointer transition bg-base-900/20">
                <span class="text-xs text-slate-400 block" id="csvStatus">Trascina o clicca per caricare il file (CSV/Excel) di iShares/Vanguard/Amundi</span>
                <span class="text-[10px] text-slate-500 block mt-1">Caricate attualmente: <span id="csvHoldingsCount" class="text-accent font-bold">${initialHoldingsCount}</span> società</span>
                <input id="csvFileInput" type="file" accept=".csv,.xlsx,.xls" class="hidden">
              </div>
            </div>

            <div class="flex gap-3 pt-2">
              <button type="button" id="cancelAsset" class="flex-1 bg-base-800 hover:bg-base-700 border border-base-700 text-slate-200 font-semibold text-sm px-4 py-2.5 rounded-xl transition">Annulla</button>
              <button type="submit" class="flex-1 bg-accent hover:bg-accent-soft text-base-950 font-bold text-sm px-4 py-2.5 rounded-xl transition">Salva</button>
            </div>
          </form>
        </div>
      </div>
    `;
    mountModal(html);
    const modal = document.getElementById('modalBackdrop');
    const csvDropZone = modal.querySelector('#csvDropZone');
    const csvFileInput = modal.querySelector('#csvFileInput');
    const csvStatus = modal.querySelector('#csvStatus');
    const csvHoldingsCount = modal.querySelector('#csvHoldingsCount');

    csvDropZone.addEventListener('click', () => csvFileInput.click());
    
    csvDropZone.addEventListener('dragover', (e) => {
      e.preventDefault();
      csvDropZone.classList.add('border-accent');
    });
    
    csvDropZone.addEventListener('dragleave', () => {
      csvDropZone.classList.remove('border-accent');
    });
    
    csvDropZone.addEventListener('drop', (e) => {
      e.preventDefault();
      csvDropZone.classList.remove('border-accent');
      const file = e.dataTransfer.files[0];
      if (file) handleCSVFile(file);
    });

    csvFileInput.addEventListener('change', (e) => {
      const file = e.target.files[0];
      if (file) handleCSVFile(file);
    });

    function handleCSVFile(file) {
      processAssetCompositionFile(file, (parsed) => {
        tempCSVData = parsed;
        csvStatus.textContent = 'Composizione caricata correttamente!';
        csvStatus.className = 'text-xs text-accent font-semibold block';
        csvHoldingsCount.textContent = parsed.holdings.length;
        toast(`Caricate con successo ${parsed.holdings.length} società!`);
      });
    }

    modal.querySelector('#closeModal').addEventListener('click', closeModal);
    modal.querySelector('#cancelAsset').addEventListener('click', closeModal);
    modal.addEventListener('click', (e) => { if (e.target === modal) closeModal(); });

    modal.querySelector('#assetForm').addEventListener('submit', (e) => {
      e.preventDefault();
      const fd = new FormData(e.target);
      const tickerVal = fd.get('ticker').trim().toUpperCase();
      const payload = {
        ticker: tickerVal,
        name: fd.get('name').trim(),
        isin: fd.get('isin').trim().toUpperCase(),
        price: Math.max(0.0001, parseFloat(fd.get('price')) || 1),
        meanReturn: parseFloat(fd.get('meanReturn')) / 100,
        volatility: parseFloat(fd.get('volatility')) / 100,
        targetWeight: Math.max(0, Math.min(100, parseFloat(fd.get('targetWeight')) || 0)) / 100,
      };

      if (!payload.ticker || !payload.name || !payload.isin) {
        toast('Compila tutti i campi', 'err');
        return;
      }

      if (editing) {
        const original = state.settings.assets[ticker];
        Object.assign(original, payload);
        if (tempCSVData) {
          original.holdings = tempCSVData.holdings;
          original.geographic = tempCSVData.geographic;
          original.sector = tempCSVData.sector;
        }
        toast('Titolo aggiornato');
      } else {
        if (state.settings.assets[payload.ticker]) {
          toast('Il ticker esiste già', 'err');
          return;
        }
        if (tempCSVData) {
          payload.holdings = tempCSVData.holdings;
          payload.geographic = tempCSVData.geographic;
          payload.sector = tempCSVData.sector;
        } else {
          payload.holdings = [];
          payload.geographic = {};
          payload.sector = {};
        }
        state.settings.assets[payload.ticker] = payload;
        toast('Titolo aggiunto');
      }
      saveState();
      closeModal();
      renderAll();
    });
  }

  function confirmDeleteAsset(ticker) {
    const goalsUsing = state.goals.filter(g => g.assetTicker === ticker);
    if (goalsUsing.length > 0) {
      toast(`Impossibile eliminare: utilizzato da ${goalsUsing.length} obiettivi`, 'err');
      return;
    }
    openConfirm('Eliminare titolo?', `"${ticker}" verrà rimosso dall'anagrafica.`, () => {
      delete state.settings.assets[ticker];
      saveState();
      toast('Titolo eliminato');
      renderAll();
    }, true);
  }

  /* ---------------------------------- PWA: install + service worker ---------------------------------- */

  let deferredPrompt = null;
  window.addEventListener('beforeinstallprompt', (e) => {
    e.preventDefault();
    deferredPrompt = e;
    document.getElementById('installBtn').classList.remove('hidden');
    document.getElementById('installBtn').classList.add('flex');
  });
  document.getElementById('installBtn').addEventListener('click', async () => {
    if (!deferredPrompt) return;
    deferredPrompt.prompt();
    await deferredPrompt.userChoice;
    deferredPrompt = null;
    document.getElementById('installBtn').classList.add('hidden');
  });
  window.addEventListener('appinstalled', () => {
    document.getElementById('installBtn').classList.add('hidden');
    toast('App installata correttamente');
  });

  if ('serviceWorker' in navigator && location.protocol.startsWith('http')) {
    window.addEventListener('load', () => {
      navigator.serviceWorker.register('sw.js').catch((err) => console.warn('SW registration failed', err));
    });
  }

  /* ---------------------------------- Theme Switching ---------------------------------- */

  function applyTheme(themeName) {
    document.body.classList.remove('theme-minimal', 'theme-glass');
    if (themeName === 'minimal') {
      document.body.classList.add('theme-minimal');
    } else if (themeName === 'glass') {
      document.body.classList.add('theme-glass');
    }

    document.querySelectorAll('.theme-tab-btn').forEach((btn) => {
      const active = btn.dataset.themeVal === themeName;
      if (active) {
        btn.classList.add('bg-accent', 'text-base-950', 'shadow-sm');
        btn.classList.remove('text-slate-400', 'hover:bg-base-800');
      } else {
        btn.classList.remove('bg-accent', 'text-base-950', 'shadow-sm');
        btn.classList.add('text-slate-400', 'hover:bg-base-800');
      }
    });

    const ct = chartTheme();
    Chart.defaults.color = ct.tick;
    Chart.defaults.borderColor = ct.grid;
  }

  document.querySelectorAll('.theme-tab-btn').forEach((btn) => {
    btn.addEventListener('click', () => {
      const selected = btn.dataset.themeVal;
      state.settings.theme = selected;
      saveState();
      applyTheme(selected);
      renderAll();
      
      const names = { glow: 'Glow Premium', minimal: 'Neo-Minimalist', glass: 'iOS Glassmorphism' };
      toast(`Stile applicato: ${names[selected]}`);
    });
  });

  /* ---------------------------------- Bootstrap ---------------------------------- */

  applyTheme(state.settings.theme || 'glow');
  checkTemporalAutomation();
  updatePricesOnline(true);
  setView('dashboard');
  updateCloudHeaderBtn();
  checkCloudOnStartup();
})();
</script>
</body>
</html>
